# AI Eval Suite — Test definitions with expected outcomes
# Each test defines a question, setup, and correctness criteria.
# Baselines from tmp/ai-bridge-testing.md (verified 2026-04-05).

tests:
  # ────────────────────────────────────────────────────────────
  # BB Tests — AdventureWorks
  # ────────────────────────────────────────────────────────────

  - id: bb-q1-employee
    question: "List all objects that directly read or write the Employee table"
    type: bb
    difficulty: easy
    dacpac: test/AdventureWorks.dacpac
    origin: "[HumanResources].[Employee]"
    scope_direction: downstream
    filter: null
    expected:
      delivery: inline
      nodes_required:
        - uspUpdateEmployeeHireInfo
        - uspUpdateEmployeeLogin
        - uspUpdateEmployeePersonalInfo
        - vEmployee
        - vEmployeeDepartment
        - vEmployeeDepartmentHistory
        - uspGetEmployeeManagers
        - uspGetManagerEmployees
        - vSalesPerson
        - vSalesPersonSalesByFiscalYears
        # EmployeePayHistory removed — connected to Employee via FK only, no SQL body edge in graph
        - ufnGetContactInformation
      nodes_forbidden:
        - uspLogError
        - uspPrintError
        - ErrorLog
      max_hops: 0  # inline = no SM hops

  - id: bb-q2-employee-deep
    question: "What objects depend on the Employee table and how is Employee data consumed?"
    type: bb
    difficulty: medium
    dacpac: test/AdventureWorks.dacpac
    origin: "[HumanResources].[Employee]"
    scope_direction: downstream
    filter: null
    expected:
      delivery: inline
      nodes_required:
        - uspUpdateEmployeeHireInfo
        - uspUpdateEmployeeLogin
        - uspUpdateEmployeePersonalInfo
        - vEmployee
        - vEmployeeDepartment
        - vEmployeeDepartmentHistory
        - uspGetEmployeeManagers
        - uspGetManagerEmployees
        - vSalesPerson
        - vSalesPersonSalesByFiscalYears
        # EmployeePayHistory removed — FK only, no graph edge
        - ufnGetContactInformation
      nodes_forbidden:
        - uspLogError
        - uspPrintError
      max_hops: 0

  - id: bb-q4-sales
    question: "Where does sales come from?"
    type: bb
    difficulty: hard
    dacpac: test/AdventureWorks.dacpac
    origin: null  # AI must discover via search
    scope_direction: null  # AI decides
    filter: null
    expected:
      delivery: inline  # AW sales tables are leaf nodes, small scope
      nodes_required: []  # No fixed set — AI picks origin
      nodes_forbidden: []
      max_hops: 20
      # Soft criteria (not FAIL, just WARN):
      # - Origin should be a high-degree Sales object
      # - Result should span 2+ schemas
      # - Graph should be connected

  # ────────────────────────────────────────────────────────────
  # BB Tests — Customer Dacpac (CadenceWorker)
  # ────────────────────────────────────────────────────────────

  - id: bb-q5-cadenceworker
    question: "Analyze business logic in the CadenceWorker pipeline"
    type: bb
    difficulty: hard
    dacpac: customer-data/dacpac/Synapse_Data_Warehouse.dacpac
    origin: "[TRANSFORMATION_FINANCEHUB].[CadenceWorker]"
    scope_direction: upstream
    filter:
      schemas:
        - TRANSFORMATION_FINANCEHUB
        - STAGING_FINANCEHUB
        - CONSUMPTION_FINANCEHUB
        - dbo
    expected:
      delivery: sm
      nodes_required:
        - spCadenceRule_INIT
        - spCadenceRule_OOS
        - spCadenceRule_DEPT
        - spCadenceRule_RATE
        - spCadenceRule_Alloc1a
        - spCadenceRule_Alloc1b
        - spCadenceRule_Alloc1c
        - spCadenceRule_Alloc1d
        - spCadenceRule_Alloc2
        - CadenceExtract_TEST
        - CadenceRates_TEST
        - vDataFilters
      nodes_forbidden:
        - udfDivideAsDec
        - udfConvertUnixTS
        - udfCreateKeyValuePair
        - logmessage
      max_hops: 15
      min_badges: 10

  # ────────────────────────────────────────────────────────────
  # CT Tests — AI Schema Dacpac
  # ────────────────────────────────────────────────────────────

  - id: ct-q3-customersegment
    question: "Trace CustomerSegment column upstream from FactSalesReport"
    type: ct
    difficulty: easy
    dacpac: tmp/AdventureWorks2025_AI.dacpac
    origin: "[ai].[FactSalesReport]"
    columns: [CustomerSegment]
    direction: up
    filter: null
    expected:
      delivery: sm
      chain_path:
        - FactSalesReport
        - spBuildSalesReport
        - CustomerMaster
        - CustomerSegmentMap
        - spRefreshSegments
      column_renames_min: 1  # SegmentName -> CustomerSegment
      max_hops: 5

  - id: ct-q1-totalrevenue
    question: "Trace TotalRevenue column upstream from FactSalesReport"
    type: ct
    difficulty: hard
    dacpac: tmp/AdventureWorks2025_AI.dacpac
    origin: "[ai].[FactSalesReport]"
    columns: [TotalRevenue]
    direction: up
    filter: null
    expected:
      delivery: sm
      chain_length_min: 17
      branches: 2
      column_renames_min: 7
      source_nodes:
        - SAPOrders
        - OracleOrders
        - SupplierPrices
        - MarkupRules
      max_hops: 15

  - id: ct-q2-adjustedrevenue
    question: "Trace AdjustedRevenue column upstream from FactSalesReport"
    type: ct
    difficulty: hardest
    dacpac: tmp/AdventureWorks2025_AI.dacpac
    origin: "[ai].[FactSalesReport]"
    columns: [AdjustedRevenue]
    direction: up
    filter: null
    expected:
      delivery: sm
      # AdjustedRevenue = TotalRevenue - Discount branch
      # Superset of ct-q1 plus Discount path
      branches: 3  # Qty + UnitPrice + Discount
      column_renames_min: 7
      source_nodes:
        - SAPOrders
        - OracleOrders
        - SupplierPrices
        - MarkupRules
      max_hops: 20

  # ────────────────────────────────────────────────────────────
  # CT Tests — AdventureWorks (known limitation)
  # ────────────────────────────────────────────────────────────

  - id: ct-q3-aw-businessentityid
    question: "Trace BusinessEntityID column upstream from Employee"
    type: ct
    difficulty: medium
    dacpac: test/AdventureWorks.dacpac
    origin: "[HumanResources].[Employee]"
    columns: [BusinessEntityID]
    direction: up
    filter: null
    known_limitation: "FK relationships don't create graph edges — CT follows SQL body edges only"
    expected:
      delivery: sm
      # Person.Person SHOULD be in trace (FK source) but won't be (known limitation)
      # SPs that reference Employee will appear as upstream (graph-correct, semantically wrong)
      max_hops: 5

  # ────────────────────────────────────────────────────────────
  # Type 2 — Dependency Trace (CT without columns)
  # ────────────────────────────────────────────────────────────

  - id: dep-q1-vemployee
    question: "Trace all dependencies upstream from vEmployee"
    type: ct
    difficulty: easy
    dacpac: test/AdventureWorks.dacpac
    origin: "[HumanResources].[vEmployee]"
    columns: []  # empty = dependency mode (Type 2)
    direction: up
    filter: null
    expected:
      delivery: sm
      nodes_required:
        - Employee
        - Person
      max_hops: 8

  # ────────────────────────────────────────────────────────────
  # BB with schema filter — inline delivery
  # ────────────────────────────────────────────────────────────

  - id: bb-q6-production-filter
    question: "What does the Product table depend on?"
    type: bb
    difficulty: easy
    dacpac: test/AdventureWorks.dacpac
    origin: "[Production].[Product]"
    scope_direction: upstream
    filter:
      schemas:
        - Production
    expected:
      delivery: inline
      nodes_required: []
      nodes_forbidden: []
      max_hops: 0

  # ────────────────────────────────────────────────────────────
  # BB auto-add — AI should discover out-of-scope staging deps
  # ────────────────────────────────────────────────────────────

  - id: bb-q7-cadence-add-ids
    question: "What staging tables feed into the CadenceWorker transformation?"
    type: bb
    difficulty: medium
    dacpac: customer-data/dacpac/Synapse_Data_Warehouse.dacpac
    origin: "[TRANSFORMATION_FINANCEHUB].[CadenceWorker]"
    scope_direction: upstream
    filter:
      schemas:
        - TRANSFORMATION_FINANCEHUB
        # STAGING_FINANCEHUB intentionally omitted — AI should notice staging deps
        # and either add_ids or note as outside filter
    expected:
      delivery: sm
      nodes_required:
        - spCadenceRule_INIT
      nodes_forbidden:
        - udfDivideAsDec
      max_hops: 15

  # ────────────────────────────────────────────────────────────
  # CT rejection recovery — multi-CTE rename chain
  # ────────────────────────────────────────────────────────────

  - id: ct-q4-tricky-rename
    question: "Trace UnitPrice column upstream from FactSalesReport"
    type: ct
    difficulty: hard
    dacpac: tmp/AdventureWorks2025_AI.dacpac
    origin: "[ai].[FactSalesReport]"
    columns: [UnitPrice]
    direction: up
    filter: null
    expected:
      delivery: sm
      nodes_required:
        - vwPriceList
        - PriceMaster
        - SupplierPrices
      column_renames_min: 3
      max_hops: 10
      # Tests: AI must navigate ListPrice→BasePrice→AdjPrice→UnitPrice rename chain
      # Likely triggers invalid_columns — tests self-correction

  # ────────────────────────────────────────────────────────────
  # BB scope_too_broad — AI must pick direction
  # ────────────────────────────────────────────────────────────

  - id: bb-q8-scope-broad
    question: "Analyze the Person table"
    type: bb
    difficulty: medium
    dacpac: test/AdventureWorks.dacpac
    origin: null  # AI must search and pick direction
    scope_direction: null
    filter: null
    expected:
      delivery: inline
      nodes_required: []
      nodes_forbidden: []
      max_hops: 20
      # Tests: scope_too_broad handling — AI should pick upstream or downstream

  # ────────────────────────────────────────────────────────────
  # BB early completion — must visit direct neighbors first
  # ────────────────────────────────────────────────────────────

  - id: bb-q9-cadence-early-complete
    question: "What is the purpose of spCadenceRule_INIT?"
    type: bb
    difficulty: easy
    dacpac: customer-data/dacpac/Synapse_Data_Warehouse.dacpac
    origin: "[TRANSFORMATION_FINANCEHUB].[spCadenceRule_INIT]"
    scope_direction: downstream
    filter:
      schemas:
        - TRANSFORMATION_FINANCEHUB
        - STAGING_FINANCEHUB
        - dbo
    expected:
      delivery: sm
      nodes_required:
        - CadenceWorker
      max_hops: 10
      # Tests: complete_rejected guard — AI must visit CadenceWorker (direct neighbor) before complete:true

  # ════════════════════════════════════════════════════════════
  # Category A: Forced Rejection Recovery
  # Agent is INSTRUCTED to send wrong data first, then self-correct
  # ════════════════════════════════════════════════════════════

  - id: rej-ct-focus
    question: "Trace TotalRevenue upstream from FactSalesReport"
    type: ct
    subtype: forced_rejection
    difficulty: easy
    dacpac: tmp/AdventureWorks2025_AI.dacpac
    origin: "[ai].[FactSalesReport]"
    columns: [TotalRevenue]
    direction: up
    filter: null
    agent_instruction: |
      REJECTION TEST: On your FIRST submit_hop_analysis call, deliberately send
      focus_node_id: "DELIBERATELY_WRONG". You WILL get a focus_mismatch error.
      Read the hint, extract the correct ID, resubmit correctly.
      Report BOTH the error response AND the successful retry.
      IMPORTANT: After recovery, complete the FULL trace. Your final answer must be
      complete — same quality as a non-rejection test. Do not stop early.
    expected:
      delivery: sm
      errors_expected:
        - focus_mismatch
      must_self_correct: true
      # Final answer must still be complete despite the rejection
      nodes_required:
        - spBuildSalesReport
        - vwConsolidatedSales
        - vwPriceList
      column_renames_min: 3
      max_hops: 15

  - id: rej-ct-columns
    question: "Trace TotalRevenue upstream from FactSalesReport"
    type: ct
    subtype: forced_rejection
    difficulty: easy
    dacpac: tmp/AdventureWorks2025_AI.dacpac
    origin: "[ai].[FactSalesReport]"
    columns: [TotalRevenue]
    direction: up
    filter: null
    agent_instruction: |
      REJECTION TEST: On your FIRST trace verdict, send columns_to_trace: ["FAKE_COLUMN"].
      You WILL get an invalid_columns error with a valid[] list. Pick a correct column
      from that list based on the DDL, then resubmit. Report BOTH error and retry.
      IMPORTANT: After recovery, complete the FULL trace. Final answer must be complete.
    expected:
      delivery: sm
      errors_expected:
        - invalid_columns
      must_self_correct: true
      nodes_required:
        - spBuildSalesReport
        - vwConsolidatedSales
      column_renames_min: 3
      max_hops: 15

  - id: rej-bb-focus
    question: "List all objects that directly read or write the Employee table"
    type: bb
    subtype: forced_rejection
    difficulty: easy
    dacpac: test/AdventureWorks.dacpac
    origin: "[HumanResources].[Employee]"
    scope_direction: downstream
    filter: null
    agent_instruction: |
      REJECTION TEST: On your FIRST submit_findings call, deliberately send
      focus_node_id: "DELIBERATELY_WRONG". You WILL get a focus mismatch error.
      Read the hint, extract the correct ID, resubmit correctly.
      Report BOTH the error response AND the successful retry.
      IMPORTANT: After recovery, complete the FULL analysis. Final answer must be complete.
    expected:
      delivery: inline
      errors_expected:
        - focus_mismatch
      must_self_correct: true
      nodes_required:
        - uspUpdateEmployeeHireInfo
        - vEmployee
        - ufnGetContactInformation
      max_hops: 5

  # ════════════════════════════════════════════════════════════
  # Category B: Prune Guard Tests
  # Agent tries actions that SM guards should reject
  # ════════════════════════════════════════════════════════════

  - id: guard-bb-direct-neighbor
    question: "Analyze business logic in the CadenceWorker pipeline"
    type: bb
    subtype: guard_test
    difficulty: medium
    dacpac: customer-data/dacpac/Synapse_Data_Warehouse.dacpac
    origin: "[TRANSFORMATION_FINANCEHUB].[CadenceWorker]"
    scope_direction: upstream
    filter:
      schemas:
        - TRANSFORMATION_FINANCEHUB
        - STAGING_FINANCEHUB
        - dbo
    agent_instruction: |
      GUARD TEST: After receiving your first hop, attempt to prune_ids the FIRST
      neighbor with scope=in_scope that is a DIRECT neighbor of the origin (CadenceWorker).
      The SM should reject this with Guard 0: "Direct neighbor of origin".
      Report the rejected_prune_ids response, then continue normally.
    expected:
      delivery: sm
      errors_expected:
        - rejected_prune_ids  # Guard 0: direct neighbor of origin
      max_hops: 15

  # ════════════════════════════════════════════════════════════
  # Category C: Scope Tier Tests
  # ════════════════════════════════════════════════════════════

  - id: scope-bb-out-of-filter
    question: "What staging tables feed into the CadenceWorker transformation?"
    type: bb
    subtype: scope_test
    difficulty: medium
    dacpac: customer-data/dacpac/Synapse_Data_Warehouse.dacpac
    origin: "[TRANSFORMATION_FINANCEHUB].[CadenceWorker]"
    scope_direction: upstream
    filter:
      schemas:
        - TRANSFORMATION_FINANCEHUB
        # STAGING_FINANCEHUB intentionally omitted
    agent_instruction: |
      SCOPE TEST: Look for neighbors with scope=available and in_filter=false.
      These are staging tables outside the user's schema filter.
      You should mention them in your text response — e.g. "STAGING_FINANCEHUB has relevant objects".
      Do NOT silently ignore them. Report which out-of-filter objects you found.
    expected:
      delivery: sm
      must_mention_out_of_filter: true  # AI text should reference STAGING_FINANCEHUB
      nodes_required:
        - spCadenceRule_INIT
      nodes_forbidden:
        - udfDivideAsDec
      max_hops: 15

  - id: scope-bb-external
    question: "Trace TotalRevenue upstream from FactSalesReport"
    type: bb
    subtype: scope_test
    difficulty: easy
    dacpac: tmp/AdventureWorks2025_AI.dacpac
    origin: "[ai].[FactSalesReport]"
    scope_direction: upstream
    filter: null
    agent_instruction: |
      SCOPE TEST: Look for neighbors with scope=external (referenced in DDL but not in model).
      The ext schema objects should appear as external references. Note them in your findings.
    expected:
      delivery: inline  # small scope
      max_hops: 20

  # ════════════════════════════════════════════════════════════
  # Category D: Output Quality Tests
  # Agent must call enrich_view and report the full input
  # ════════════════════════════════════════════════════════════

  - id: output-bb-badges
    question: "Analyze business logic in the CadenceWorker pipeline"
    type: bb
    subtype: output_quality
    difficulty: hard
    dacpac: customer-data/dacpac/Synapse_Data_Warehouse.dacpac
    origin: "[TRANSFORMATION_FINANCEHUB].[CadenceWorker]"
    scope_direction: upstream
    filter:
      schemas:
        - TRANSFORMATION_FINANCEHUB
        - STAGING_FINANCEHUB
        - CONSUMPTION_FINANCEHUB
        - dbo
    agent_instruction: |
      OUTPUT TEST: After exploration completes, call lineage_enrich_view with full output.
      Report the EXACT enrich_view input as JSON including:
      - name, summary (check: ≤300 chars)
      - badges[] (check: 5-8 badges, format "N Label", each text ≤20 chars)
      - notes[] (check: every badged node has a note)
      - description (first 500 chars — check: has ## headings)
      - highlight_groups[] (check: 2-3 nodes, ONE scheme: Lineage or Diagnostic)
    expected:
      delivery: sm
      output_checks:
        badges_min: 5
        badges_max: 12
        summary_max_chars: 300
        description_has_headings: true
      max_hops: 15

  - id: output-ct-chain
    question: "Trace TotalRevenue upstream from FactSalesReport"
    type: ct
    subtype: output_quality
    difficulty: hard
    dacpac: tmp/AdventureWorks2025_AI.dacpac
    origin: "[ai].[FactSalesReport]"
    columns: [TotalRevenue]
    direction: up
    filter: null
    agent_instruction: |
      OUTPUT TEST: After trace completes, report the full chain from the result.
      For each chain entry report: nodeId, columnsIn, columnsOut.
      Check: columnsOut of node N should match columnsIn of node N+1 (rename tracking).
      Report any column_rejections from the result.
    expected:
      delivery: sm
      chain_length_min: 10
      column_renames_min: 3
      max_hops: 15

  # ════════════════════════════════════════════════════════════
  # Category E: CT Column Rejection Behavior
  # ════════════════════════════════════════════════════════════

  - id: ct-always-reject
    question: "Trace TotalRevenue upstream from FactSalesReport"
    type: ct
    subtype: forced_rejection
    difficulty: medium
    dacpac: tmp/AdventureWorks2025_AI.dacpac
    origin: "[ai].[FactSalesReport]"
    columns: [TotalRevenue]
    direction: up
    filter: null
    agent_instruction: |
      REJECTION LOOP TEST: On the first trace verdict, send columns_to_trace: ["WRONG1"].
      You will get invalid_columns. Then send ["WRONG2"]. Another invalid_columns.
      Then send ["WRONG3"]. STILL invalid_columns (SM never accepts garbage).
      After 3 rejections, the hint says "prune/pass to continue".
      Prune or pass this neighbor, then continue the trace normally.
      Report ALL error responses and your recovery action.
    expected:
      delivery: sm
      errors_expected:
        - invalid_columns
        - invalid_columns
        - invalid_columns
      must_self_correct: true  # AI must prune/pass after repeated rejection
      max_hops: 15