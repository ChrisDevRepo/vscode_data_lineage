# ─────────────────────────────────────────────────────────────────────────────
# AI Output Templates — how @lineage captures and formats its analysis.
#
# Drives BOTH what the AI captures per hop AND how the final present_result
# document is rendered. Edit `instruction` text to change behaviour.
#
# VS Code override: `dataLineageViz.ai.outputTemplateFile`. Your overlay
# merges on top of this default — your keys win.
#
# Stages:
#   discovery  = first chat response, no SM. Trivial questions only.
#   active     = per-hop analysis. The AI writes one detail_analysis slot
#                per node into the unbounded archive. *_capture keys fire
#                here. Loading pattern, distribution hints, SQL evidence and
#                ⚠️ invariants are captured AT WRITE TIME — synthesis lifts
#                what the slot already contains.
#   synthesis  = final document assembly. summary, title, intro, sections,
#                closing, description, highlights, notes fire here. Slot
#                bodies arrive pre-formatted — synthesis assembles, groups,
#                frames; it does not rewrite.
#
# Authoritative routing lives in code (templateRenderer.ts → STAGE_BY_KEY).
# YAML `stages:` is informational — overlays that contradict are logged
# and ignored.
# ─────────────────────────────────────────────────────────────────────────────

# ── Card + top of the document ───────────────────────────────────────────────

summary:
  stages: [synthesis]
  instruction: >
    One-line graph purpose, ~120 chars (max 300). Short teaser, not the
    analysis. Detailed content belongs in the sections below.
  example: "Revenue lineage from raw orders through price calculation to FactSalesReport."

title:
  stages: [synthesis]
  instruction: >
    Optional. ≤80 chars. Names the analysis subject and its key finding:
    "[Subject] — [key computation, pattern, or finding]". Include the final
    output object if space allows. Omit step counts and numbers.
    GOOD: "TotalRevenue — Qty × UnitPrice, 6-hop chain to FactSalesReport"
  example: "TotalRevenue — Qty × UnitPrice, 6-hop ETL to FactSalesReport"

intro:
  stages: [synthesis]
  instruction: >
    2–4 sentences of narrative prose as a standalone paragraph before the
    sections. Open by acknowledging the lens implied by the user's question
    (the **Mission type:** set above — `business`, `technical`, or `both`)
    and answer at headline level: what does the analysis reveal, where does
    data originate, what structural pre-conditions does the reader need.
    Refer to shared state by role ("central scratch-pad table", "terminal
    publication step") rather than by listing its columns. Schema details
    (column names, data types, nullability) belong in the later sections.
  example: >
    Read as a business-driven view: TotalRevenue is the product of Qty
    and UnitPrice — both computed independently before joining at
    spBuildSalesReport. Qty originates in raw order imports; UnitPrice is
    derived from supplier margins with a markup formula.

# ── Section grouping (assembly only — slot bodies arrive pre-formatted) ──────

sections:
  stages: [synthesis]
  instruction: >
    Assemble sections[] for the present_result payload. Each section is a
    (label, node_ids[] 1..N, text 1..1) tuple. Lift each slot's `analysis`
    text from the archive — it is already a pre-formatted body written at
    the right angle for the user's question. Synthesis assembles, groups,
    frames; it does not rewrite.

    Same label on multiple nodes groups them; one section per unique label.
    Label by role ("Pipeline Seeder", "EV Computation Hub", "Reverse
    Consolidation") rather than by tech artefact ("Loading Pattern", "SCD
    Resolution"). Follow the dependency chain in one direction
    (Source → Transform → Target, or the reverse). Section header:
    `## <label>` — no leading numbers (system numbers them).

    Density: 2–4 sections for focused (≤10 nodes), 4–8 for broad (10–20),
    up to 10–12 for full pipeline (20+). Use `suggested_sections` from the
    completion result as a starting skeleton.

    Sibling variants. When 3+ slots share the same shape (same formula
    pattern, differing only in filters / keys / outputs), emit ONE
    comparison table whose rows are the variants and columns are the
    differing fields. Hoist the shared formula / SQL once above the
    table. Preserve every ⚠️ from every slot — in the variant's row or a
    per-variant invariants list after the table. Distinct logic always
    gets its own section.

    Pass / Prune slots. Render as one-line mentions inside a
    `### Passthrough / Pruned` subsection — do not expand their text.
  example: '{ "label": "Revenue Calculation", "node_ids": ["dbo.spCalcRevenue"], "text": "…" }'

closing:
  stages: [synthesis]
  instruction: >
    Optional, after the sections, separated by a `---` divider. Two uses:
    (a) when the analysis spans 5+ sections, end with a one-paragraph
    through-line that names the overall pipeline answer in the lens the
    user requested; (b) flag a cross-cutting risk / data-quality issue
    that applies to the whole graph and doesn't fit any single section
    (prefix with ⚠️). Omit if neither applies.
  example: "⚠️ If vwPriceList returns NULL for any SKU, TotalRevenue = Qty × 0 — verify price coverage before each INSERT run."

# ── Fallback body when sections[] is absent ──────────────────────────────────

description:
  stages: [synthesis]
  instruction: >
    Used only when sections[] is not provided. Prefer sections[] for
    structured output. If used: write the full documentation at archive
    depth — every finding, every expression, every pattern, every issue.
    Structure with ## headings (one per logical group); quote SQL verbatim
    inside code blocks.
    Supported: ## headings, **bold**, `code`, lists, | tables |, math, code blocks.
    Not supported: mermaid, HTML, images, footnotes.

# ── Graph-side decorations ───────────────────────────────────────────────────

highlights:
  stages: [synthesis]
  instruction: >
    Glow 2–3 critical nodes only. Pick one scheme: Lineage
    (source/transform/target) or Diagnostic (good/warn/fail). Do not mix.

notes:
  stages: [synthesis]
  instruction: >
    Per-node captions (node_id, text). One-line caption under each node —
    what it does specifically in this flow, not a generic description.
    Glancing at graph + notes should tell the story without opening the
    description. First line visible, rest on hover via \n.
    If the node is a passthrough, say what it passes or filters
    ("Passthrough — WHERE IsValid = 1 filter only").
    GOOD: "Computes TotalRevenue = Qty × UnitPrice at INSERT\nAlso computes
    AdjustedRevenue = TotalRevenue - Discount"
  example: "Aggregates monthly invoices\nSELECT SUM(Amount) GROUP BY Month FROM Invoices"

# ── Per-hop capture (active phase) ───────────────────────────────────────────
# These keys govern what the AI writes into detail_analysis per hop. The
# unbounded archive preserves every character verbatim for synthesis to lift.

business_capture:
  stages: [active]
  instruction: >
    Write the WHAT angle into detail_analysis — what the data means, which
    business rules apply, which consumers are affected.
    Question shape: if the question asks WHAT the data means or WHY a value is
    computed, lead with business meaning first. If it asks HOW the pipeline runs,
    write the business context after the technical_capture slot.
    Business Purpose: open with one sentence naming the actual domain role of
    this node — not "stores data" or "processes records" but the specific
    function: "computes revenue at INSERT", "allocates budget units to cost
    centres". Specific > generic.
    Document every business rule visible in the DDL — every CASE condition,
    every threshold value, every allocation formula, every special-case
    branch. Selective capture produces thin synthesis.
    Capture per node:
    - Business meaning per column / computation; consumer impact.
    - Formulas with variable definitions (math directly).
    - Column renames or mappings as a | From | To | Business meaning | table.
    - Risk or data-quality issue — prefix with ⚠️.
    - How this node answers the user's question.
    Always list each column the focus procedure reads or writes by name —
    quote the predicate or write the formula. Columns that are merely present
    on a neighbour table belong in `lineage_get_neighbor_columns`, not here.
    Sibling variants: write your individual slot normally. Synthesis will
    consolidate 3+ sibling slots into a comparison table — do not pre-merge.
    GOOD: "`spCalcRevenue` computes TotalRevenue = Qty × UnitPrice at INSERT.
    Qty = units sold (renamed from OrderQty in CTE_Orders). UnitPrice = list
    price after markup (CostPrice × (1 + MarkupPct)). ⚠️ Null MarkupPct
    collapses UnitPrice to CostPrice — verify coverage before each run."

technical_capture:
  stages: [active]
  instruction: >
    Write the HOW angle into detail_analysis — how the pipeline runs, the SQL
    expressions that drive it, performance characteristics.
    Question shape: if the question asks HOW the pipeline runs, rebuild order,
    or join strategies, lead with execution first. If it asks WHAT the data
    means, write the technical context after the business_capture slot.
    Capture per node:
    - SQL evidence: copy key expressions verbatim — JOIN predicate,
      CASE WHEN condition, COALESCE fallback, computed column formula. Quote
      as written in the DDL; do not paraphrase. Snippet only, not the full
      INSERT/SELECT statement.
    - Loading pattern as a fact: "TRUNCATE + INSERT — full reload, no delta
      tracking" / "MERGE upsert by ProductId" / "INSERT-only append" / etc.
      Coarse description; write the words that fit the SP.
    - Every computed column: formula alongside its snippet.
    - Relationships with role labels: "reads lookup from DimProduct",
      "writes via MERGE to FactSalesReport", "triggered by spLoadOrders".
    - Join types when hinted (HASH / MERGE / LOOP) — ⚠️ warn on Cartesian.
    - Antipatterns: excessive DISTINCT, OR in join predicates, correlated
      subqueries in SELECT.
    - Distribution / indexing hints: partition key, hash-distribution column.
    - DDL comments, version annotations — carry author intent lost after
      this hop.
    Variant siblings: capture the first in full; siblings write "Same
    skeleton as <first>; deltas: <specific differences in filters, weights,
    target columns>".
    GOOD: "Loading: TRUNCATE + INSERT — full reload, no delta tracking.
    CTE_Orders: base filter WHERE IsActive = 1 (sargable, index on IsActive).
    INNER HASH JOIN DimProduct on ProductId — correct for large-orders × small-products.
    LEFT JOIN vwPriceList on ProductId — ⚠️ unmatched rows produce NULL downstream;
    no ISNULL guard before the final INSERT."

# ── Reduced capture for non-bodied starting points ───────────────────────────

structural_summary:
  stages: [active]
  instruction: >
    Reduced capture template — fires only when the user's starting point is a
    non-bodied node (a table or any node without a DDL body). Replaces the
    business_capture / technical_capture templates for this single hop.

    Describe what this node **is**; point to the surrounding procedures for
    what it **does**. Non-bodied nodes carry structure, not behaviour.

    Required sections (use these headings exactly):

    ## Purpose
    One sentence naming the role of this node in the pipeline (≤200 chars).

    ## Columns
    Render the columns list as a `| Column | Type | Role / ⚠️ |` table. Role
    is a short phrase (key / dim / metric / audit / computed). Flag
    nullability risks with ⚠️ inline. Factual metadata only.

    ## Upstream sources
    Bulleted list of adjacent bodied nodes that **write to** this node. One
    line per source: node id + one-sentence role.

    ## Downstream consumers
    Bulleted list of adjacent bodied nodes that **read from** this node. One
    line per consumer: node id + one-sentence role.

    ## Grain / keys
    Primary key + common join keys from foreign keys. One short paragraph.

    Banned in this template: transform formulas, CASE logic, business rules,
    step-by-step behaviour. Those belong in the procedure slots.

# ── Shared depth + format floor (active + synthesis) ─────────────────────────

general:
  stages: [active, synthesis]
  instruction: >
    Write at full depth — this IS the documentation; there is no follow-up
    step. Aim 800–2 000 chars per `Columns / logic` section. If a procedure
    has more logic than fits, split into labelled sub-sections rather than
    prose-extending a single section — the archive is unbounded, additional
    sub-sections are preferred to sprawling paragraphs.

    Format to fit the content:
    Column renames or mappings → | From | To | Notes | table.
    Multi-step logic → ordered 1. 2. 3. list.
    Key SQL expressions → ```sql code fence (snippet only, not the full statement).
    Column and object names → `backtick`.
    Risk or data-quality issue → ⚠️ prefix inline inside the section where it
    occurs — not consolidated in closing.

    Supported: ## headings, **bold**, `code`, tables, math, code fences.
    Not supported: mermaid, HTML, images, footnotes.

# ── Synthesis-side render rules (mirror the capture keys) ────────────────────

business_subsection:
  stages: [synthesis]
  instruction: |
    Emit as the main body of the section's text. No subheading.
    Write the WHAT angle: formulas, column renames as | From | To | Business meaning |
    table, what each value represents, which consumers are affected.
    Lift every business rule from the archive and present it at full depth — every
    formula, every rename, every condition. Synthesis with thin sections wastes the
    archive; expand, do not compress.
    Risk or data-quality issue: ⚠️ prefix inline inside this section text — closing
    is for cross-cutting issues only.
    Name every column explicitly. "Various columns" → list each name.

technical_subsection:
  stages: [synthesis]
  instruction: |
    Emit as a `#### Technical` subheading below the business body in the same
    section text.
    Write the HOW angle: how the pipeline runs, SQL expression evidence, join
    strategies, loading patterns, constraint coverage, antipatterns, rebuild order.
    Quote key SQL expressions verbatim — preserve the DDL's exact expressions.
    Every computed column: SQL snippet + its LaTeX formula side by side.
    Variant siblings: DISTINCT logic → full block per variant. SIMILAR logic →
    delta-mode "Same skeleton as <first>; deltas: [specific differences in
    filters, weights, target columns]". Every variant still gets its own
    #### Technical block.

# ── Metadata band (rendered when origin is an SP) ────────────────────────────

loading_pattern:
  stages: [synthesis]
  instruction: >
    Only emit when the origin is a stored procedure. Classify how the SP
    loads its target with one coarse value. Suggested values, but write a
    short phrase in your own words if none fit:
      reload        — TRUNCATE + INSERT / full refresh
      append        — INSERT-only, no UPDATE or DELETE
      upsert        — MERGE or UPDATE + conditional INSERT
      historization — versioned history / change tracking
      purge         — DELETE-only / retention cleanup
      orchestration — EXECs other SPs, no data mutation on the target itself
    Coarse only — no SCD1 / SCD2 / CDC sub-variants. If ambiguous, omit.
    Views and UDFs: omit.
  example: "reload"
