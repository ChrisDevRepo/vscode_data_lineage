# ─────────────────────────────────────────────────────────────────────────────
# AI Output Templates — how @lineage captures and formats its analysis.
#
# Drives BOTH what the AI captures per hop AND how the final present_result
# document is rendered. Edit `instruction` text to change behaviour.
#
# VS Code override: `dataLineageViz.ai.outputTemplateFile`. Your overlay
# merges on top of this default — your keys win.
#
# Full key reference (purpose + maintenance for each key): see
#   docs/AI_PROMPTS.md  →  §3 Custom Output Templates (YAML Interface)
# https://github.com/ChrisDevRepo/vscode_data_lineage/blob/main/docs/AI_PROMPTS.md#3-custom-output-templates-yaml-interface
#
# Contract — AI writes parts, engine builds the document:
#
#   AI writes structured PARTS:
#     active phase: business_capture / technical_capture / structural_summary
#                   → produces sections[].text bodies stored in the archive
#     synthesis:    summary, title, intro, sections[], closing, notes[],
#                   highlight_groups[]
#                   → assembled by the engine into the rendered document
#
#   Engine OWNS deterministic outputs (no instruction template — the AI never
#   writes these):
#     - The full markdown document shown in AiDescriptionOverlay (built by
#       orderAndAssemble in src/ai/tools.ts from title + intro + sections[]
#       + closing).
#     - Section numbering (## N {label}), badge chips, ### Objects link blocks.
#
#   Do NOT add an instruction template for any field the engine builds itself.
#   The lift+group+label rule for sections[] lives in src/ai/prompts.ts →
#   buildSynthesisPrompt(), not here, to avoid duplication.
#
# Stages:
#   discovery  = first chat response, no SM. Trivial questions only.
#   active     = per-hop analysis. The AI writes one section per fired
#                *_capture template into `submit_findings.sections[]`.
#                Each fired *_capture produces ONE section (angle + text).
#                business classification → 1 section; technical → 1; both → 2.
#                Templates are independent — no cross-references between
#                business_capture and technical_capture.
#   synthesis  = final document assembly. The engine assembles the rendered
#                document from the AI's submitted parts; the templates here
#                describe only the parts the AI writes from scratch.
#
# Authoritative routing lives in code (templateRenderer.ts → STAGE_BY_KEY).
# YAML `stages:` is informational — overlays that contradict are logged
# and ignored.
# ─────────────────────────────────────────────────────────────────────────────

# ── Discovery (chat-only) — editable via overlay ─────────────────────────────

discovery_chat:
  stages: [discovery]
  instruction: >
    Markdown. Fully fulfill what the user asked. Cite the node and field
    you are reading from. State only what is present in the loaded
    `bb_ddl`, the `cols[]` / `in[]` / `out[]` / `fks[]` fields, and tool
    results — when a field is empty, say so plainly. Ground every claim
    in the loaded data; leave general SQL knowledge and naming conventions
    aside. Default to business-focused wording. Include SQL snippets, predicate
    details, or column-level mechanics only when needed to clarify a business
    point the user asked about.


    Scale the answer to the question:

    - **Single-object question** ("what does X do", "show DDL of X", "list
      columns of X") — one focused answer. Open with the direct answer,
      then explain business meaning and impact. Add technical mechanics only
      when needed for business clarification.

    - **Multi-object walk** (dependency trace, lineage walk, "N levels
      up/down", "what feeds X", "list dependencies of X") — one Markdown
      heading per node visited. Under each heading: a short business
      paragraph (what the node represents and why it matters). Add technical
      mechanics only when needed for business clarification. Cover every node you loaded
      and use only nodes that appeared in your tool-call results. Order
      the headings to match the lineage flow (origin first, then upstream,
      then downstream — or the order the user named).


    Output rendering (math fences, rename tables, source-guard SQL fences,
    status-enum lifecycles, ⚠️ markers) is governed by the `general`
    template — apply its rules whenever the loaded data carries the
    underlying material.

# ── Card + top of the document ───────────────────────────────────────────────

summary:
  stages: [synthesis]
  instruction: >
    One-line graph purpose (~120 chars, max 300). Shown in the info card.
  example: "Revenue lineage from raw orders through price calculation to FactSalesReport."

title:
  stages: [synthesis]
  instruction: >
    Optional. ≤80 chars. Names the analysis subject and its key finding:
    "[Subject] — [key computation, pattern, or finding]". Include the final
    output object if space allows. Omit step counts and numbers.
    GOOD: "TotalRevenue — Qty × UnitPrice, 6-hop chain to FactSalesReport"
  example: "TotalRevenue — Qty × UnitPrice, 6-hop ETL to FactSalesReport"

intro:
  stages: [synthesis]
  instruction: >
    2–4 sentences of narrative prose as a standalone paragraph before the
    sections. Open with the direct answer to the user's stated question —
    name the origin, the key relationship, or the finding the user asked
    for — then set architectural context. Refer to shared state by role
    ("central scratch-pad table", "terminal publication step") rather than
    by listing its columns. Schema details (column names, data types,
    nullability) belong in the later sections.
  example: >
    Read as a business-driven view: TotalRevenue is the product of Qty
    and UnitPrice — both computed independently before joining at
    spBuildSalesReport. Qty originates in raw order imports; UnitPrice is
    derived from supplier margins with a markup formula.

# Section assembly (lift + group + label) is governed by buildSynthesisPrompt()
# in src/ai/prompts.ts — kept there to avoid duplication with the synthesis cue.
# This file documents only the parts the AI writes from scratch.

closing:
  stages: [synthesis]
  instruction: >
    Required when this template is rendered (analysis spans 5+ sections).
    After the sections, separated by a `---` divider, write a brief
    closing block:
    (1) one-paragraph through-line that names the overall pipeline answer
    in the lens the user requested, and
    (2) a top-risks markdown table — the cross-cutting data-quality / scope
    risks that span sections (each row prefixed with ⚠️). Two columns:
    `| Risk | Scope |`. Draw from ⚠️ markers visible in the node
    summaries and note_captions; do not invent new risks.
  example: |
    The spBuildSalesReport pipeline reloads from staging each run, applies a
    four-stage cascade (order staging → price calculation → discount
    application → fact write), and lands USD-converted totals in FactSalesReport.

    | Risk | Scope |
    |---|---|
    | ⚠️ NULL UnitPrice in SalesOrderDetail collapses TotalRevenue | All revenue rows |
    | ⚠️ Missing DimCurrency rows produce NULL CurrencyTotal | Final fact load |

# `description` is engine output (built by orderAndAssemble in src/ai/tools.ts
# from title + intro + sections[] + closing) — NOT an AI-writeable field.
# No instruction template here, by design.

# ── Graph-side decorations ───────────────────────────────────────────────────

highlights:
  stages: [synthesis]
  instruction: >
    Glow 2–3 critical nodes only. Pick one scheme: Lineage
    (source/transform/target) or Diagnostic (good/warn/fail). Do not mix.

notes:
  stages: [synthesis]
  instruction: >
    Per-node captions (node_id, text). ONE short sentence under each node —
    what it does specifically in this flow, not a generic description. Keep
    it terse; ~120 chars typical. No SQL snippets, no formulas, no multi-line
    captions. Detail belongs in the section body, not in the graph caption.
    Glancing at graph + notes should tell the story; deeper logic lives in
    the description.
    If the node is a passthrough, name what it passes or filters in one
    short clause ("Passthrough — IsValid filter").
    GOOD: "Computes TotalRevenue at INSERT"
    BAD : "Computes TotalRevenue = Qty × UnitPrice at INSERT\nAlso computes
    AdjustedRevenue" (multi-line + formula belongs in the section body).
  example: "Aggregates monthly invoices"

# ── Per-hop capture (active phase) ───────────────────────────────────────────
# Each fired *_capture template produces ONE section into submit_findings.sections[].
# Submit shape: { angle: 'business' | 'technical', text: '<body>' }.
# Independent specs — no cross-references between templates. Each section is
# self-contained; synthesis groups across nodes at the next phase.

business_capture:
  stages: [active]
  instruction: |
    <purpose>
    Capture this node's BUSINESS MEANING — what each record represents,
    what changes when a rule fires, which decisions or values flow
    downstream, why each rule matters to the domain.
    </purpose>

    ⛔ STRICT GROUNDING — analyze only `bb_ddl` from the focus node. Do not
    invent rules, formulas, thresholds, or relationships. If a construct is
    absent from DDL, treat it as out of scope.

    Submit one section: `{ angle: "business", text: "<body>" }`. The
    archive has no length cap and synthesis lifts your text verbatim —
    write at the depth the node's role in answering the user's question
    warrants. Nodes that directly address the question get full depth;
    context nodes in scope but tangential to the question get a brief
    functional note. Brevity here becomes brevity in the final report.

    <emphasis>
    Highest-value content, in order:
    1. **Business outcome** — what changes for users, reporting, or decisions.
    2. **Decision rules** — what condition triggers the change and what outcome it drives.
    3. **Lifecycle impact** — business status/phase transitions when present.
    4. **Audit-trail meaning** — what business event each audit entry represents.
    5. **Data-quality risks** — ⚠️ inline at the point they apply.
    6. **Technical evidence** — formulas, predicates, or column references only when
       needed to clarify a business point.
    </emphasis>

    <body_recipe>
    1. Open with one sentence naming the domain role ("computes revenue
       at INSERT", "allocates budget units across cost centres",
       "applies tier-discount when order qualifies").
    2. Walk through business rules in plain language first. Name what
       changes for the business when each rule fires.
    3. Add formulas, predicates, and column-level details only when needed
       to clarify a business point; keep them short and targeted.
    4. Express status-enum lifecycles as numbered transitions
       ("1. New → 2. Approved → 3. Shipped"). Capture the business
       state change, not the SQL UPDATE that effects it.
    5. Mark data-quality risks with ⚠️ inline at the point they apply.
    6. For SELECT-only views (no INSERT/UPDATE/DELETE): describe what data
       this view makes queryable and its business meaning — not how the
       SELECT is structured.
    7. Wrap column and object names in `\`backticks\`` only when used.
    </body_recipe>
  example: |
    `spCalcRevenue` computes `TotalRevenue` at the final INSERT into
    `FactSalesReport`, only for rows with `Status = 'CONFIRMED'`.

    ```math
    TotalRevenue = Qty \times UnitPrice
    ```

    1. `Qty` is line-item quantity sold, renamed from `OrderQty` in
       `CTE_Orders`.
    2. `UnitPrice` is list price after markup:
       `UnitPrice = CostPrice × (1 + MarkupPct)`.
    3. The fact row is INSERTed with `TotalRevenue` populated.

    | From | To | Business meaning |
    |------|----|------------------|
    | OrderQty | Qty | line-item quantity sold |
    | ListPrice | UnitPrice (pre-markup) | sticker price |
    | MarkupPct | UnitPrice (component) | supplier-specific uplift |

    ⚠️ Null `MarkupPct` collapses `UnitPrice` to `CostPrice` — verify
    supplier coverage before each run. Consumer impact: every revenue
    dashboard reads `TotalRevenue` directly; this rule defines the
    dashboard's accuracy.

technical_capture:
  stages: [active]
  instruction: |
    <purpose>
    Capture HOW this node runs — execution mechanics, query shape, loading
    pattern, performance affordances and traps.
    </purpose>

    ⛔ STRICT GROUNDING — analyze only `bb_ddl` from the focus node. Do not
    invent indexes, partitioning, performance issues, or references. Tie
    performance claims to visible SQL constructs (JOIN, WHERE, DISTINCT,
    subquery). If it is not in DDL, it is out of scope.

    Submit one section: `{ angle: "technical", text: "<body>" }`. The
    archive has no length cap; synthesis lifts your text verbatim. Write
    as deeply as the node's implementation warrants.

    <body_recipe>
    1. SQL evidence — quote the key expressions verbatim: JOIN predicates,
       CASE conditions, COALESCE fallbacks, computed-column formulas, the
       window-function partition clause. Snippet only, not the full
       INSERT/SELECT statement.
    2. Loading pattern (procedures only) — one coarse value: `reload`
       (TRUNCATE + INSERT), `append` (INSERT-only), `upsert` (MERGE or
       UPDATE + conditional INSERT), `historization` (versioned history),
       `purge` (DELETE-only), `orchestration` (EXECs other SPs, no data
       mutation). Coarse only — sub-variants (SCD1/SCD2/CDC) belong in
       prose if relevant. Omit when the focus is a view, UDF, or table.
    3. Computed columns — formula alongside its snippet.
    4. Relationship role labels — "reads lookup from `DimProduct`",
       "writes via MERGE to `FactSalesReport`", "triggered by `spLoadOrders`".
    5. Join types when hinted (HASH / MERGE / LOOP); flag Cartesian risk
       with ⚠️.
    6. Antipatterns — excessive DISTINCT, OR in join predicates,
       correlated subqueries in SELECT, scalar UDFs in WHERE.
    7. Distribution / indexing hints — partition key, hash-distribution
       column, clustered-index column order.
    8. Datatype declarations — call out non-default precisions
       (`DECIMAL(19,4)` vs `DECIMAL(18,2)`), nullability surprises, and
       casts that change semantics (`CAST AS DATE` truncating time).
    9. Execution-plan affordances and traps — sargability of WHERE
       predicates, parameter-sniffing risks, statistics dependencies.
    10. DDL comments and version annotations — author intent that would be
       lost after this hop.
    </body_recipe>

    Format with markdown — `## Purpose` opener, SQL in ```sql fences
    (snippet only), join steps as ordered lists, ⚠️ inline at risks.

    Each capture is independent — synthesis detects sibling variants
    across nodes and emits comparison tables at assembly time.
  example: >
    Loading: TRUNCATE + INSERT — full reload, no delta tracking.

    ```sql
    INSERT INTO dbo.FactSalesReport (TotalRevenue, ProductId, Qty)
    SELECT o.OrderQty * p.UnitPrice, o.ProductId, o.OrderQty
    FROM CTE_Orders o
    INNER HASH JOIN DimProduct p ON o.ProductId = p.ProductId
    LEFT JOIN vwPriceList pl ON o.ProductId = pl.ProductId
    WHERE o.IsActive = 1
    ```

    Filters: `WHERE IsActive = 1` is sargable (index on `IsActive`).
    `INNER HASH JOIN` on `ProductId` — correct for large-orders × small-products.
    `LEFT JOIN vwPriceList` on `ProductId` — ⚠️ unmatched rows produce NULL
    downstream; no ISNULL guard before the INSERT.
    Index hint: clustered on `(ProductId, OrderDate)` for downstream aggregation.

# ── Reduced capture for non-bodied starting points ───────────────────────────

structural_summary:
  stages: [active]
  instruction: >
    Fires only when the focus node has no DDL body (table/non-bodied).
    For this hop only, it replaces `business_capture` and `technical_capture`.

    Describe what this node **is**; point to the surrounding procedures for
    what it **does**. Non-bodied nodes carry structure, not behaviour.

    ⛔ STRICT GROUNDING — use only `focus_node` data. Do not invent columns,
    objects, neighbors, or relationships. If a field is missing/empty, output
    the explicit empty-case text below.

    Required sections (use these headings exactly):

    ## Purpose
    One short sentence naming the role of this node in the pipeline.
    Source: node id / type from focus_node.

    ## Columns
    From `cols[]` only, render a `| Column | Type | Role / ⚠️ |` table. Role is a short phrase
    (key / dim / metric / audit / computed). Flag nullable columns with ⚠️.
    If `cols[]` is absent: write "Column metadata not available in current model."

    ## Upstream sources
    Populate from `in[]` in focus_node — these are the nodes that write TO
    this table. One line per entry: node id + one-sentence role.
    If `in[]` is empty or absent: write "No upstream sources found in graph."

    ## Downstream consumers
    Populate from `out[]` in focus_node — these are the nodes that read FROM
    this table. One line per entry: node id + one-sentence role.
    If `out[]` is empty or absent: write "No downstream consumers found in graph."

    ## Grain / keys
    Derive from PK-flagged columns in `cols[]` and `fks[]` in focus_node only.
    If neither is present: write "Key information not available in current model."

    Scope: structure and relationships only — the surrounding procedure slots carry all transform logic.

# ── Column Trace capture (active phase, CT mode only) ────────────────────────
# Fires additively alongside business_capture / technical_capture when the
# session has targetColumns set. Instructs the AI to fill out the column_flow
# JSON per hop. CT-mode-gated in templateRenderer.ts → CT_MODE_GATED.
# sections[].text (semantic channel) should cover business/technical logic only —
# NOT re-state column flow; that belongs exclusively in column_flow.

column_trace_capture:
  stages: [active]
  instruction: |
    <purpose>
    Per active column — one explicit decision:
      → Column interacts with this node  →  fill column_flow (map to upstream source) + route upstream.
      → Column does NOT interact         →  column_flow: []   Engine auto-prunes. No route_requests needed.

    column_flow is engine-validated. Missing it entirely (field not submitted) returns column_flow_required.
    Submitting column_flow: [] is the correct signal for no interaction — do not invent contributors.
    </purpose>

    ## Before submitting — verify
    □ Per active column: column_flow has entries (interaction) OR column_flow: [] (no interaction). Never omit the field.
    □ column_flow[] has one entry per active column that interacts with this node.
    □ sections[].text (from business/technical capture) explains the context of the flow.
    □ sections[].text: open with focus node as subject — "[schema].[FocusNode] is ..." not "This node is the builder for `OtherNode`".

    ## Example — column interacts (Revenue computed at vw_Sales)
    column_flow: [
      { out_col: "Revenue",
        contributors: [
          { from_node: "fact_orders", from_col: "Qty",       role: "formula" },
          { from_node: "fact_orders", from_col: "UnitPrice", role: "formula" }
        ]}
    ]
    verdict: "analyze"

    ## Example — column does not interact with this node
    column_flow: []    ← engine auto-prunes this node

    ## Verdict — choose based on how the node interacts with tracked columns
    - `analyze`: the node transforms or is the terminal source of a target column.
      Fill column_flow for each active column.
      Terminal source (no upstream possible): role:"source", contributors:[].
      Terminal sources: stored base column, hardcoded literal, system
      function (GETDATE(), NEWID()). Empty contributors signals the branch ends here.
    - `pass`: column flows through unchanged; the upstream writer is not yet visited.
      Fill column_flow naming the contributor, then add route_requests to visit it.
      The edge is recorded here; full attribution resolves at the routed node.

    ## Non-bodied table focus (TABLE written by a procedure)
    When the focus node is a TABLE (no DDL — only schema metadata), the procedure that
    writes to it is upstream. Use verdict='pass'; use the column name as it appears in the table.
    column_flow: [{ out_col: "TotalRevenue", contributors: [{ from_node: "[schema].[spWriter]", from_col: "TotalRevenue", role: "rename" }] }]
    Leave route_requests empty — the CT engine queues contributors[] automatically.

    ## column_flow fields per entry
    - out_col: column name being produced. For PROCEDURE focus: the column name in the target table (same as writes_to.col).
    - contributors[]: upstream source(s). One entry per upstream input.
      Formula / CASE / COALESCE with multiple inputs: list each contributor separately.
    - writes_to: set when the focus node is a PROCEDURE that writes to a table.
      Must be an OBJECT: { node: "[schema].[TargetTable]", col: "ColumnName" }.
      NOT a string. out_col = the column name being written; contributors = upstream inputs.

    ## Common patterns
    - Rename: from_col ≠ out_col → role:"rename".
    - Fan-out (one source → two output columns): two entries, same from_col.
    - Computed expression from two columns: two contributor entries, role:"formula".

    ## role values — assign from the transformation visible in the DDL
    `source`     — terminal: stored base column, literal, or system function (GETDATE(), NEWID())
    `rename`     — same data, different name; no transformation
    `formula`    — arithmetic, string concat, or other computed expression
    `case`       — CASE expression
    `coalesce`   — COALESCE / ISNULL fallback
    `join_value` — value supplied by a joined table
    `aggregate`  — SUM / COUNT / AVG / MAX / MIN or similar aggregation
    `filter_only`— column used in WHERE / JOIN-ON only; the engine excludes it
                   from data-flow edges automatically

# Per-angle section assembly (business / technical / both) is governed by
# buildSynthesisPrompt() in src/ai/prompts.ts. No separate per-angle templates
# here — the lift+group+label rule is identical for both angles and lives in
# the synthesis cue to avoid duplication.

# ── Cross-section rendering at synthesis ─────────────────────────────────────
# Always-on at synthesis. Describes HOW captured content renders consistently
# across every section in the assembled document. Conditional triggers — each
# rule fires only when the captured slot bodies contain the underlying
# material; the AI does NOT invent tables / formulas / fences without source.

general:
  stages: [discovery, synthesis]
  instruction: >
    Apply this rendering set across every assembled section so the document
    reads consistently end-to-end. Prioritize business clarity; include
    technical formatting only when needed to clarify business meaning:

    - **Formulas**: include only when they clarify business behavior; keep
      them concise and grounded in captured content.
    - **Column renames**: render as a `| From | To | Business meaning |`
      table only when the rename pattern is central to business understanding.
    - **Source guards** (WHERE / JOIN / MERGE predicates that filter or key
      the data): quote short SQL snippets only when needed for business
      clarification; never include full statements.
    - **Status-enum lifecycles**: express as numbered transitions
      ("1. New → 2. Approved → 3. Shipped").
    - **Risks / data-quality flags**: every ⚠️ from capture appears in the
      assembled section at the point it applies — verbatim, in place.

    These rules apply only when the captured body has the underlying material.
    Do not invent tables, formulas, or fences without source.
  example: >
    ```math
    TotalRevenue = Qty \times UnitPrice \times (1 - Discount)
    ```

    | From | To | Business meaning |
    | --- | --- | --- |
    | OrderQty | Qty | Units sold per order line |
    | ListPrice | UnitPrice | Price after supplier markup |

    ```sql
    WHERE o.IsActive = 1 AND o.OrderDate >= DATEADD(YEAR, -2, GETDATE())
    ```

    Status flow: 1. New → 2. Reviewed → 3. Approved → 4. Shipped → 5. Closed.

    ⚠️ Null `Discount` collapses TotalRevenue to Qty × UnitPrice — verify input.

# ── Big-picture ETL closing — TECHNICAL angle only ───────────────────────────
# Classification-gated to ['technical', 'both'] in templateRenderer.ts.
# Skips entirely on business-only missions because business framing names
# domain consequences, not load shapes.

loading_pattern:
  stages: [synthesis]
  instruction: >
    Technical-angle closing addition. When all bodied procedures in scope
    share a single load shape, name it once in the closing note as the
    big-picture ETL pattern. Recognized shapes (coarse — no SCD1/SCD2/CDC
    sub-variants):

    - `reload`        TRUNCATE + INSERT / full refresh
    - `append`        INSERT-only, no UPDATE or DELETE
    - `upsert`        MERGE or UPDATE + conditional INSERT
    - `historization` versioned history / change tracking
    - `purge`         DELETE-only / retention
    - `orchestration` EXECs other SPs, no data mutation on the target

    Skip when shapes differ across procedures, when the analysis spans
    non-bodied origins only, or when classification is `business`.
  example: >
    Loading pattern: every bodied procedure in this chain uses TRUNCATE +
    INSERT — each run rebuilds `FactSalesReport` from scratch with no
    delta tracking. Downstream consumers must tolerate full-replace
    semantics; there is no incremental-load fallback.
