# ─────────────────────────────────────────────────────────────────────────────
# AI Output Templates — how @lineage captures and formats its analysis.
#
# This file drives BOTH what the AI captures per hop AND how the final
# enrich_view document is rendered. Edit any `instruction` text below to
# change the AI's behaviour.
#
# VS Code override: setting `dataLineageViz.ai.outputTemplateFile`. Point it
# at your own file; your file merges on top of this default — your keys win.
#
# ── Understanding `stages:` ──────────────────────────────────────────────────
# Every key declares a `stages:` list saying when its instruction is shown to
# the AI. Three stages:
#
#   discover   = first response in a chat turn, before any exploration has
#                started. Fires only for trivial questions that never engage
#                the state machine.
#
#   active     = per-hop analysis. The AI writes one `detail_analysis` slot
#                per node into the archive. Keys at this stage shape WHAT
#                the AI captures. If you don't capture it here, it's gone —
#                the synthesis phase has no access to the raw DDL.
#
#   synthesis  = final document assembly. The AI builds the enrich_view
#                payload from the archive it just captured. Keys at this
#                stage shape HOW the final document reads.
#
# Convention for the two content angles:
#   *_capture    = shown at ACTIVE — controls what the AI archives.
#   *_subsection = shown at SYNTHESIS — controls how that content renders.
#
# Edits to a capture key change what gets written into detail memory per hop.
# Edits to a subsection key change how that captured content appears in the
# final document. Both must agree — edit one without the other and content
# drifts between capture and render.
#
# `stages:` itself is informational. The authoritative routing lives in code
# (`src/ai/templateRenderer.ts` → STAGE_BY_KEY). An overlay that contradicts
# the canonical routing is logged and ignored.
#
# Renderer-tied format (LaTeX for math, markdown tables, code fences) is
# handled by the TypeScript system prompt — do not restate in YAML.
# ─────────────────────────────────────────────────────────────────────────────

# ── Card + top of the document ───────────────────────────────────────────────

summary:
  stages: [discover, synthesis]
  instruction: >
    One-line graph purpose, ~120 chars (max 300). A short teaser, not the
    analysis. Don't compress analysis depth to fit this line — detailed
    content belongs in the sections below.
  example: "Revenue lineage from raw orders through price calculation to FactSalesReport."

title:
  stages: [synthesis]
  instruction: >
    Optional. ≤80 chars. Names the analysis subject and its key finding:
    "[Subject] — [key computation, pattern, or finding]". Include the final
    output object if space allows. Omit step counts and numbers.
    BAD: "TotalRevenue" (too vague), "Revenue Lineage Analysis Report" (too long).
    GOOD: "TotalRevenue — Qty × UnitPrice, 6-hop chain to FactSalesReport"
  example: "TotalRevenue — Qty × UnitPrice, 6-hop ETL to FactSalesReport"

intro:
  stages: [synthesis]
  instruction: >
    Optional. 2–4 sentences as a standalone paragraph before the numbered
    sections. Answer: what does the analysis reveal? where does data
    originate? what structural pre-conditions does the reader need? No
    bullet lists, no headings. Do not repeat section content — context only.
    BAD: "This graph shows how TotalRevenue flows from Source to Target."
    GOOD: "TotalRevenue is the product of Qty and UnitPrice — both computed
    independently before joining at spBuildSalesReport…"
  example: >
    TotalRevenue is the product of Qty and UnitPrice — both computed
    independently before joining at spBuildSalesReport. Qty originates in
    raw order imports; UnitPrice is derived from supplier margins with a
    markup formula.

# ── Section grouping (container shape) ───────────────────────────────────────

sections:
  stages: [synthesis]
  instruction: >
    Assemble sections[] for the enrich_view payload. Each section is a
    (label, node_ids[] 1..N, text 1..1) tuple:
      label    = unique name for this logical group (also the badge chip on the graph)
      node_ids = nodes that display this label chip (1..N)
      text     = markdown body (one per label)

    System numbers labels in the order you write them — follow the
    dependency chain in one direction (Source → Transform → Target, or the
    reverse). label has no leading number.

    Grouping guidance:
      Same label on multiple nodes groups them. One section per unique label.
      Focused questions (≤10 nodes): 2–4 sections.
      Broad explorations (10–20 nodes): 4–8 sections.
      Full pipeline documentation (20+ nodes): up to 10–12 sections.
      Passthrough nodes: mention in one sentence inside the containing
      section; do not put them in node_ids or give them their own section.
      Use `suggested_sections` from the completion result as your starting
      structure.

    BAD order: jumping non-linearly (Target → Source → Transform → Views).
    BAD text: "Stores project data." / "Reads from Source." (no detail).
    GOOD order: follow the dependency chain in one direction without skipping.
  example: '{ "label": "Revenue Calculation", "node_ids": ["dbo.spCalcRevenue"], "text": "…" }'

closing:
  stages: [synthesis]
  instruction: >
    Optional. 1–2 sentences after the sections, separated by a --- divider.
    Use only for a cross-cutting risk / data-quality issue / design note
    that applies to the whole graph and doesn't fit any single section.
    Prefix risks with ⚠️. Omit if nothing material to add.
    BAD: "Overall this correctly computes TotalRevenue." (summary — never repeat)
    GOOD: "⚠️ If vwPriceList returns NULL for any SKU, TotalRevenue = Qty × 0 —
    verify price coverage before each INSERT run."
  example: "⚠️ If vwPriceList returns NULL for any SKU, TotalRevenue = Qty × 0 — verify price coverage before each INSERT run."

# ── Fallback body when sections[] is absent ──────────────────────────────────

description:
  stages: [discover, synthesis]
  instruction: >
    Used only when sections[] is not provided. Prefer sections[] for
    structured output. If used: write the full documentation at archive
    depth — every finding, every expression, every pattern, every issue.
    Structure with ## headings (one per logical group); quote SQL verbatim
    inside code blocks.
    Supported: ## headings, **bold**, `code`, lists, | tables |, math, code blocks.
    Not supported: mermaid, HTML, images, footnotes.
  bad_example: "Data flows from staging through transformation to consumption."
  good_example: |
    ## Revenue Calculation
    `spCalcRevenue` reads `FactOrders.OrderQty` and `ProductPricing.CostPrice`,
    then `vw_SalesData` applies the region filter: `WHERE RegionCode = 'WEST'`.

# ── Graph-side decorations ───────────────────────────────────────────────────

highlights:
  stages: [synthesis]
  instruction: >
    Glow 2–3 critical nodes only. Pick one scheme: Lineage
    (source/transform/target) or Diagnostic (good/warn/fail). Do not mix.

notes:
  stages: [synthesis]
  instruction: >
    Per-node captions (node_id, text). One-line caption under each node —
    what it does specifically in this flow, not a generic description.
    Glancing at graph + notes should tell the story without opening the
    description. First line visible, rest on hover via \n.
    If the node is a passthrough, say what it passes or filters
    ("Passthrough — WHERE IsValid = 1 filter only").
    BAD: "Stores project data." / "Reads from Source." (no specifics).
    GOOD: "Computes TotalRevenue = Qty × UnitPrice at INSERT\nAlso computes
    AdjustedRevenue = TotalRevenue - Discount"
  example: "Aggregates monthly invoices\nSELECT SUM(Amount) GROUP BY Month FROM Invoices"

# ── Metadata band (rendered when origin is an SP) ────────────────────────────

loading_pattern:
  stages: [synthesis]
  instruction: >
    Only emit when the origin is a stored procedure. Classify how the SP
    loads its target with one coarse value. Suggested values, but write a
    short phrase in your own words if none fit:
      reload        — TRUNCATE + INSERT / full refresh
      append        — INSERT-only, no UPDATE or DELETE
      upsert        — MERGE or UPDATE + conditional INSERT
      historization — versioned history / change tracking
      purge         — DELETE-only / retention cleanup
      orchestration — EXECs other SPs, no data mutation on the target itself
    Coarse only — no SCD1 / SCD2 / CDC sub-variants. If ambiguous, omit.
    Views and UDFs: omit.
  example: "reload"

# ── Shared guidance (fires once regardless of classification) ─────────────────

general:
  stages: [active, synthesis]
  instruction: >
    Write at full depth — this IS the documentation; there is no follow-up step.
    Aim ≥ 800 chars per relevant node; a thin archive slot produces a thin section.
    Format to fit the content:
    Column renames or mappings → | From | To | Notes | table.
    Multi-step logic → ordered 1. 2. 3. list.
    Key SQL expressions → ```sql code fence (snippet only, not the full statement).
    Column and object names → `backtick`.
    Risk or data-quality issue → ⚠️ prefix inline inside the section where it occurs — not consolidated in closing.
    Supported: ## headings, **bold**, `code`, tables, math, code fences.
    Not supported: mermaid, HTML, images, footnotes.

# ── Business angle ───────────────────────────────────────────────────────────
# `business_capture` runs at ACTIVE — defines what the AI writes into detail
# memory per hop for the business angle.
# `business_subsection` runs at SYNTHESIS — defines how that content renders
# in the final document.
# Edits to both keys flow end-to-end. Change one without the other and you
# risk captured content that never appears in the output, or output that
# references content the AI never captured.

business_capture:
  stages: [active]
  instruction: >
    Write the WHAT angle into detail_analysis — what the data means, which
    business rules apply, which consumers are affected.
    Question shape: if the question asks WHAT the data means or WHY a value is
    computed, lead with business meaning first. If it asks HOW the pipeline runs,
    write the business context after the technical_capture slot.
    Business Purpose: open with one sentence naming the actual domain role of this
    node — not "stores data" or "processes records" but the specific function:
    "computes revenue at INSERT", "allocates budget units to cost centres",
    "historizes price changes into SCD rows". Specific > generic.
    Document every business rule visible in the DDL — every CASE condition, every
    threshold value, every allocation formula, every special-case branch. If the
    DDL has five CASE conditions, all five belong in the archive. Selective capture
    produces thin synthesis.
    Capture per node:
    - Business meaning: what each column / computation represents, which
      consumers are affected, what the rule achieves for the business.
    - Formulas with their variable definitions (write the math directly).
    - Column renames or mappings as a | From | To | Business meaning | table.
    - Risk or data-quality issue — prefix with ⚠️.
    - How this node answers the user's question.
    Name every column. Banned: "various columns", "several fields",
    "certain conditions" — list the names or quote the predicate.
    BAD: "COLUMNS: OrderQty (int), UnitPrice (money) — stores order data."
    GOOD: "`spCalcRevenue` computes TotalRevenue = Qty × UnitPrice at INSERT.
    Qty = units sold (renamed from OrderQty in CTE_Orders). UnitPrice = list
    price after markup (CostPrice × (1 + MarkupPct)). ⚠️ Null MarkupPct
    collapses UnitPrice to CostPrice — verify coverage before each run."

business_subsection:
  stages: [synthesis]
  instruction: |
    Emit as the main body of the section's text. No subheading.
    Write the WHAT angle: formulas, column renames as | From | To | Business meaning |
    table, what each value represents, which consumers are affected.
    Lift every business rule from the archive and present it at full depth — every
    formula, every rename, every condition. Synthesis with thin sections wastes the
    archive; expand, do not compress.
    Risk or data-quality issue: ⚠️ prefix inline inside this section text — closing is
    for cross-cutting issues only.
    Name every column explicitly. "Various columns" → list each name.
    BAD: "spCalcRevenue computes revenue from orders and products."
    GOOD: "`spCalcRevenue` computes TotalRevenue = Qty × UnitPrice at INSERT.
    | From | To | Business meaning |
    |---|---|---|
    | OrderQty | Qty | Units sold |
    | CostPrice × (1 + MarkupPct) | UnitPrice | List price after markup |
    ⚠️ Null MarkupPct collapses UnitPrice to CostPrice — verify coverage."
  example: |
    `spCalcRevenue` computes TotalRevenue at INSERT:
    $TotalRevenue = Qty \times UnitPrice$

    | From             | To         | Business meaning |
    |---|---|---|
    | OrderQty         | Qty        | Units sold |
    | CostPrice*Markup | UnitPrice  | Price after supplier margin |

    ⚠️ Null MarkupPct collapses UnitPrice to CostPrice — verify coverage.

# ── Technical angle ──────────────────────────────────────────────────────────
# `technical_capture` runs at ACTIVE — what the AI writes for the technical
# angle. `technical_subsection` runs at SYNTHESIS — how it renders.

technical_capture:
  stages: [active]
  instruction: >
    Write the HOW angle into detail_analysis — how the pipeline runs, the SQL
    expressions that drive it, performance characteristics.
    Question shape: if the question asks HOW the pipeline runs, rebuild order, or
    join strategies, lead with execution first. If it asks WHAT the data means,
    write the technical context after the business_capture slot.
    Capture per node:
    - SQL evidence: copy key expressions verbatim — JOIN predicate, CASE WHEN
      condition, COALESCE fallback, computed column formula. Quote as written in
      the DDL; do not paraphrase. Snippet only, not the full INSERT/SELECT statement.
    - Every computed column: formula alongside its snippet.
    - Relationships with role labels: "reads lookup from DimProduct", "writes via
      MERGE to FactSalesReport", "triggered by spLoadOrders".
    - Join types when hinted (HASH / MERGE / LOOP) — ⚠️ warn on Cartesian.
    - Antipatterns: excessive DISTINCT, OR in join predicates, correlated
      subqueries in SELECT.
    - Distribution / indexing hints: partition key, hash-distribution column.
    - DDL comments, version annotations — carry author intent lost after this hop.
    Variant siblings: capture the first in full; siblings write "Same skeleton as
    <first>; deltas: <specific differences in filters, weights, target columns>".
    Constraints: no Column I/O tables, no nullability or precision prose.
    Name every column. Banned: "various", "several", "certain".
    BAD: "The procedure joins product and order tables and applies filter conditions."
    GOOD: "Loading: TRUNCATE + INSERT — full reload, no delta tracking.
    CTE_Orders: base filter WHERE IsActive = 1 (sargable, index on IsActive).
    INNER HASH JOIN DimProduct on ProductId — correct for large-orders × small-products.
    LEFT JOIN vwPriceList on ProductId — ⚠️ unmatched rows produce NULL downstream;
    no ISNULL guard before the final INSERT."

technical_subsection:
  stages: [synthesis]
  instruction: |
    Emit as a `#### Technical` subheading below the business body in the same section text.
    Write the HOW angle: how the pipeline runs, SQL expression evidence, join strategies,
    loading patterns, constraint coverage, antipatterns, rebuild order.
    Quote key SQL expressions exactly as captured — do not paraphrase.
    Every computed column: SQL snippet + its LaTeX formula side by side.
    Variant siblings: DISTINCT logic → full block per variant. SIMILAR logic →
    delta-mode "Same skeleton as spCalcRevenue; deltas: [specific differences in
    filters, weights, target columns]". Every variant still gets its own #### Technical block.
    BAD: "The procedure applies several transformations using standard SQL patterns."
    GOOD: "Loading: TRUNCATE + INSERT — full reload on every run.
    INNER HASH JOIN FactOrders on ProductId — correct shape for large-orders × small-products.
    LEFT JOIN vwPriceList on ProductId — unmatched rows yield NULL before INSERT.
    ⚠️ No ISNULL guard — NULL price propagates silently to downstream aggregations."
  example: |
    ```sql
    UnitPrice    = CostPrice * (1 + MarkupPct)
    TotalRevenue = Qty * UnitPrice
    ```
    $TotalRevenue = Qty \times CostPrice \times (1 + MarkupPct)$

    Performance / antipatterns:
    - INNER HASH JOIN on ProductId — correct shape for large-orders × small-products.
    - No DISTINCT, no OR in the join predicate.
