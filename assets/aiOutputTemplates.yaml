# ─────────────────────────────────────────────────────────────────────────────
# AI Output Templates — how @lineage captures and formats its analysis.
#
# Drives BOTH what the AI captures per hop AND how the final present_result
# document is rendered. Edit `instruction` text to change behaviour.
#
# VS Code override: `dataLineageViz.ai.outputTemplateFile`. Your overlay
# merges on top of this default — your keys win.
#
# Full key reference (purpose + maintenance for each key): see
#   docs/AI_PROMPTS.md  →  §3 Custom Output Templates (YAML Interface)
# https://github.com/ChrisDevRepo/vscode_data_lineage/blob/main/docs/AI_PROMPTS.md#3-custom-output-templates-yaml-interface
#
# Stages:
#   discovery  = first chat response, no SM. Trivial questions only.
#   active     = per-hop analysis. The AI writes one section per fired
#                *_capture template into `submit_findings.sections[]`.
#                Each fired *_capture produces ONE section (angle + text).
#                business classification → 1 section; technical → 1; both → 2.
#                Templates are independent — no cross-references between
#                business_capture and technical_capture.
#   synthesis  = final document assembly. summary, title, intro, sections,
#                closing, description, highlights, notes fire here. Captured
#                section bodies arrive pre-formatted — synthesis assembles,
#                groups across nodes (sibling-variant tables), frames; it
#                does not rewrite. Each captured section becomes a peer
#                entry in present_result.sections[] (NOT a nested subheading).
#
# Authoritative routing lives in code (templateRenderer.ts → STAGE_BY_KEY).
# YAML `stages:` is informational — overlays that contradict are logged
# and ignored.
# ─────────────────────────────────────────────────────────────────────────────

# ── Card + top of the document ───────────────────────────────────────────────

summary:
  stages: [synthesis]
  instruction: >
    One-line graph purpose, ~120 chars (max 300). Short teaser, not the
    analysis. Detailed content belongs in the sections below.
  example: "Revenue lineage from raw orders through price calculation to FactSalesReport."

title:
  stages: [synthesis]
  instruction: >
    Optional. ≤80 chars. Names the analysis subject and its key finding:
    "[Subject] — [key computation, pattern, or finding]". Include the final
    output object if space allows. Omit step counts and numbers.
    GOOD: "TotalRevenue — Qty × UnitPrice, 6-hop chain to FactSalesReport"
  example: "TotalRevenue — Qty × UnitPrice, 6-hop ETL to FactSalesReport"

intro:
  stages: [synthesis]
  instruction: >
    2–4 sentences of narrative prose as a standalone paragraph before the
    sections. Open by acknowledging the lens implied by the user's question
    (the **Mission type:** set above — `business`, `technical`, or `both`)
    and answer at headline level: what does the analysis reveal, where does
    data originate, what structural pre-conditions does the reader need.
    Refer to shared state by role ("central scratch-pad table", "terminal
    publication step") rather than by listing its columns. Schema details
    (column names, data types, nullability) belong in the later sections.
  example: >
    Read as a business-driven view: TotalRevenue is the product of Qty
    and UnitPrice — both computed independently before joining at
    spBuildSalesReport. Qty originates in raw order imports; UnitPrice is
    derived from supplier margins with a markup formula.

# ── Section grouping (assembly only — slot bodies arrive pre-formatted) ──────

sections:
  stages: [synthesis]
  instruction: >
    Assemble sections[] for the present_result payload. Each section is a
    (label, node_ids[] 1..N, text 1..1) tuple. The archive carries one or
    two captured sections per node (one per fired *_capture template). Lift
    each captured section verbatim — it is already pre-formatted at the
    right depth and angle. Synthesis assembles, groups across nodes, and
    frames; it does not rewrite.

    One section per distinct logic. Group similar slots into one section.
    Label by semantic role ("Pipeline Seeder", "EV Computation Hub",
    "Reverse Consolidation") rather than by tech artefact ("Loading
    Pattern", "SCD Resolution"). Follow the dependency chain in one
    direction (Source → Transform → Target, or the reverse). Section
    header: `## <label>` — no leading numbers (system numbers them).

    When `classification === 'both'`, captured sections come in pairs per
    node (one business, one technical). Each captured angle becomes its
    OWN peer entry in present_result.sections[] — never nest one inside
    the other. The two angles describe different things (what the data
    means vs how the pipeline runs) and stand independently in the
    document.

    Sibling variants — group across nodes. When 3+ captured sections of
    the same angle share the same shape (same formula pattern, differing
    only in filters / keys / outputs), emit ONE present_result entry whose
    `node_ids[]` lists every variant node and whose `text` is a comparison
    table. Hoist the shared formula or SQL once above the table; rows are
    the variants, columns the differing fields. Preserve every ⚠️ — in
    the variant's row or a per-variant invariants list after the table.
    Distinct logic always gets its own entry.

    Linear chains keep one section per step. When each hop transforms
    differently — A reads, B reshapes, C aggregates, D publishes — the
    reader needs the sequence; do not collapse distinct logic into a
    single entry just because the nodes are adjacent.

    Use `suggested_sections` from the completion result as a starting
    skeleton when present.

    Pass / Prune slots: render as one-line mentions inside a
    `### Passthrough / Pruned` subsection — do not expand their text.
  example: |
    {
      "label": "Revenue Calculation",
      "node_ids": ["dbo.spCalcRevenue"],
      "text": "`spCalcRevenue` computes `TotalRevenue` = $Qty \\times UnitPrice$ at INSERT into `FactSalesReport`. ⚠️ Null `MarkupPct` collapses `UnitPrice` to `CostPrice` — verify supplier coverage before each run."
    }
    Sibling-variant table (3+ similar SPs):
    {
      "label": "Aggregation Variants",
      "node_ids": ["dbo.spAggDaily", "dbo.spAggWeekly", "dbo.spAggMonthly"],
      "text": "All three follow the same TRUNCATE+INSERT skeleton:\n```sql\nTRUNCATE TABLE Fact_<grain>; INSERT INTO Fact_<grain> SELECT ... FROM Stage WHERE <filter>\n```\n| SP | Grain | Filter | Target |\n| --- | --- | --- | --- |\n| `spAggDaily` | day | `WHERE DateKey = @today` | `FactDaily` |\n| `spAggWeekly` | week | `WHERE WeekKey = @currentWeek` | `FactWeekly` |\n| `spAggMonthly` | month | `WHERE MonthKey = @currentMonth` | `FactMonthly` |\n⚠️ All three TRUNCATE without snapshot — concurrent reads see empty table."
    }

closing:
  stages: [synthesis]
  instruction: >
    Optional, after the sections, separated by a `---` divider. Two uses:
    (a) when the analysis spans 5+ sections, end with a one-paragraph
    through-line that names the overall pipeline answer in the lens the
    user requested; (b) flag a cross-cutting risk / data-quality issue
    that applies to the whole graph and doesn't fit any single section
    (prefix with ⚠️). Omit if neither applies.
  example: "⚠️ If vwPriceList returns NULL for any SKU, TotalRevenue = Qty × 0 — verify price coverage before each INSERT run."

# ── Fallback body when sections[] is absent ──────────────────────────────────

description:
  stages: [synthesis]
  instruction: >
    Used only when sections[] is not provided. Prefer sections[] for
    structured output. If used: write the full documentation at archive
    depth — every finding, every expression, every pattern, every issue.
    Structure with ## headings (one per logical group); quote SQL verbatim
    inside code blocks.
    Supported: ## headings, **bold**, `code`, lists, | tables |, math, code blocks.
    Not supported: mermaid, HTML, images, footnotes.

# ── Graph-side decorations ───────────────────────────────────────────────────

highlights:
  stages: [synthesis]
  instruction: >
    Glow 2–3 critical nodes only. Pick one scheme: Lineage
    (source/transform/target) or Diagnostic (good/warn/fail). Do not mix.

notes:
  stages: [synthesis]
  instruction: >
    Per-node captions (node_id, text). One-line caption under each node —
    what it does specifically in this flow, not a generic description.
    Glancing at graph + notes should tell the story without opening the
    description. First line visible, rest on hover via \n.
    If the node is a passthrough, say what it passes or filters
    ("Passthrough — WHERE IsValid = 1 filter only").
    GOOD: "Computes TotalRevenue = Qty × UnitPrice at INSERT\nAlso computes
    AdjustedRevenue = TotalRevenue - Discount"
  example: "Aggregates monthly invoices\nSELECT SUM(Amount) GROUP BY Month FROM Invoices"

# ── Per-hop capture (active phase) ───────────────────────────────────────────
# Each fired *_capture template produces ONE section into submit_findings.sections[].
# Submit shape: { angle: 'business' | 'technical', text: '<body>' }.
# Independent specs — no cross-references between templates. Each section is
# self-contained; synthesis groups across nodes at the next phase.

business_capture:
  stages: [active]
  instruction: >
    Submit one section: { angle: "business", text: "<body>" }. The body
    captures what the data means at this node — its domain role, business
    rules, formulas, consumer impact.

    Open the body with one sentence naming the node's actual domain role —
    "computes revenue at INSERT", "allocates budget units to cost centres",
    "historizes price changes into SCD-2 rows". Specific over generic; never
    "stores data" or "processes records".

    Capture every business rule visible in the DDL — every CASE condition,
    every threshold, every allocation formula, every special-case branch.
    Name each column the focus procedure reads or writes; quote the
    predicate or write the formula. Mark risks or data-quality issues with
    ⚠️ inline at the point they apply.

    Format the body with markdown — `## Purpose` paragraph, formulas in
    LaTeX math, column renames as `| From | To | Business meaning |` tables,
    multi-step rules as ordered lists. Use `\`backticks\`` for column and
    object names. Body is unbounded; depth-first capture beats prose extension.

    Write each focus node's section fully and independently. Do not detect
    sibling variants here — synthesis sees the whole picture and groups
    similar slots into comparison tables at assembly time.
  example: >
    `spCalcRevenue` computes `TotalRevenue` = $Qty \\times UnitPrice$ at the
    final INSERT into `FactSalesReport`. `Qty` is units sold (renamed from
    `OrderQty` in `CTE_Orders`). `UnitPrice` is list price after markup
    ($CostPrice \\times (1 + MarkupPct)$). ⚠️ Null `MarkupPct` collapses
    `UnitPrice` to `CostPrice` — verify supplier coverage before each run.
    Consumer impact: every revenue dashboard reads `TotalRevenue` directly;
    fix discipline at this node propagates downstream.

technical_capture:
  stages: [active]
  instruction: >
    Submit one section: { angle: "technical", text: "<body>" }. The body
    captures how the pipeline runs at this node — SQL evidence, loading
    pattern, joins, performance characteristics, antipatterns.

    Capture per node:
    - SQL evidence: copy key expressions verbatim — JOIN predicates,
      CASE WHEN conditions, COALESCE fallbacks, computed column formulas.
      Quote as written in the DDL; do not paraphrase. Snippet only, not
      the full INSERT/SELECT statement.
    - Loading pattern as a fact: "TRUNCATE + INSERT — full reload" /
      "MERGE upsert by ProductId" / "INSERT-only append" / "UPDATE in
      place" / etc. Coarse description.
    - Every computed column: formula alongside its snippet.
    - Relationships with role labels: "reads lookup from `DimProduct`",
      "writes via MERGE to `FactSalesReport`", "triggered by `spLoadOrders`".
    - Join types when hinted (HASH / MERGE / LOOP) — ⚠️ warn on Cartesian.
    - Antipatterns: excessive DISTINCT, OR in join predicates, correlated
      subqueries in SELECT.
    - Distribution / indexing hints: partition key, hash-distribution column.
    - DDL comments, version annotations — carry author intent lost after
      this hop.

    Format the body with markdown — `## Purpose` paragraph, SQL in
    `\`\`\`sql` code fences (snippet only), join steps as ordered lists,
    risks with ⚠️ inline. Body is unbounded; depth-first capture wins.

    Write each focus node's section fully and independently. Do not write
    "same skeleton as previous, deltas: X" — synthesis detects sibling
    variants across nodes and emits a comparison table at assembly time.
  example: >
    Loading: TRUNCATE + INSERT — full reload, no delta tracking.

    ```sql
    INSERT INTO dbo.FactSalesReport (TotalRevenue, ProductId, Qty)
    SELECT o.OrderQty * p.UnitPrice, o.ProductId, o.OrderQty
    FROM CTE_Orders o
    INNER HASH JOIN DimProduct p ON o.ProductId = p.ProductId
    LEFT JOIN vwPriceList pl ON o.ProductId = pl.ProductId
    WHERE o.IsActive = 1
    ```

    Filters: `WHERE IsActive = 1` is sargable (index on `IsActive`).
    `INNER HASH JOIN` on `ProductId` — correct for large-orders × small-products.
    `LEFT JOIN vwPriceList` on `ProductId` — ⚠️ unmatched rows produce NULL
    downstream; no ISNULL guard before the INSERT.
    Index hint: clustered on `(ProductId, OrderDate)` for downstream aggregation.

# ── Reduced capture for non-bodied starting points ───────────────────────────

structural_summary:
  stages: [active]
  instruction: >
    Reduced capture template — fires only when the user's starting point is a
    non-bodied node (a table or any node without a DDL body). Replaces the
    business_capture / technical_capture templates for this single hop.

    Describe what this node **is**; point to the surrounding procedures for
    what it **does**. Non-bodied nodes carry structure, not behaviour.

    Required sections (use these headings exactly):

    ## Purpose
    One sentence naming the role of this node in the pipeline (≤200 chars).

    ## Columns
    Render the columns list as a `| Column | Type | Role / ⚠️ |` table. Role
    is a short phrase (key / dim / metric / audit / computed). Flag
    nullability risks with ⚠️ inline. Factual metadata only.

    ## Upstream sources
    Bulleted list of adjacent bodied nodes that **write to** this node. One
    line per source: node id + one-sentence role.

    ## Downstream consumers
    Bulleted list of adjacent bodied nodes that **read from** this node. One
    line per consumer: node id + one-sentence role.

    ## Grain / keys
    Primary key + common join keys from foreign keys. One short paragraph.

    Banned in this template: transform formulas, CASE logic, business rules,
    step-by-step behaviour. Those belong in the procedure slots.

# ── Shared depth + format floor (active + synthesis) ─────────────────────────

general:
  stages: [active, synthesis]
  instruction: >
    Write at full depth. Cover every business rule, SQL expression, and
    structural fact present in the DDL — the archive is unbounded; depth-first
    capture beats prose extension. If a node has more logic than fits one
    paragraph, split into labelled sub-sections rather than extending a single
    paragraph.

    Format to fit the content:
    - Column renames or mappings → `| From | To | Notes |` table.
    - Multi-step logic → ordered 1. 2. 3. list.
    - Key SQL expressions → ` ```sql ` code fence (snippet only, not the full statement).
    - Column and object names → `\`backticks\``.
    - Risk or data-quality issue → ⚠️ prefix inline at the point it applies.

    Supported: ## headings, **bold**, `code`, tables, math, code fences.
    Not supported: mermaid, HTML, images, footnotes.

# ── Synthesis-side render rules (one peer section per captured angle) ────────
# When the captured archive contains sections with angle='business' and/or
# angle='technical', synthesis emits each as its OWN peer entry in
# present_result.sections[]. NOT nested as #### subheadings inside another
# section. Synthesis MAY group multiple captured sections of the same angle
# across sibling nodes into a single present_result entry with a comparison
# table — that is the assembly-phase decision, not the capture-phase decision.

business_subsection:
  stages: [synthesis]
  instruction: >
    For each `slot.sections` entry with `angle="business"` in the archive,
    emit a peer entry in present_result.sections[]. Lift the captured
    `section.text` verbatim — the body arrives pre-formatted at the right
    depth from the active phase.

    Label by semantic role ("Pipeline Seeder", "EV Computation Hub",
    "Reverse Consolidation"). Never use the angle name as the label.

    Sibling grouping: when 3+ captured business sections share the same
    shape (same formula pattern, differing only in filters / keys / outputs),
    emit ONE entry whose `node_ids[]` lists all the variant nodes and whose
    `text` consolidates them into a comparison table — hoist the shared
    formula or SQL once above the table. Preserve every ⚠️. Distinct logic
    always gets its own entry.

technical_subsection:
  stages: [synthesis]
  instruction: >
    For each `slot.sections` entry with `angle="technical"` in the archive,
    emit a peer entry in present_result.sections[]. Lift the captured
    `section.text` verbatim — the body arrives pre-formatted (SQL fences,
    join order, loading pattern) from the active phase.

    Label by semantic role with a technical hint when needed
    ("EV Computation — Execution", "Audit Trail — MERGE Pattern"). Never
    use the angle name as the label.

    Sibling grouping: when 3+ captured technical sections share the same
    shape (e.g. several SPs with TRUNCATE+INSERT differing only in filter),
    emit ONE entry whose `node_ids[]` lists the variants and whose `text`
    is a comparison table — hoist the shared SQL skeleton once above; the
    rows are the variants and the columns are the differing fields. Distinct
    logic always gets its own entry.

# ── Metadata band (rendered when origin is an SP) ────────────────────────────

loading_pattern:
  stages: [synthesis]
  instruction: >
    Only emit when the origin is a stored procedure. Classify how the SP
    loads its target with one coarse value. Suggested values, but write a
    short phrase in your own words if none fit:
      reload        — TRUNCATE + INSERT / full refresh
      append        — INSERT-only, no UPDATE or DELETE
      upsert        — MERGE or UPDATE + conditional INSERT
      historization — versioned history / change tracking
      purge         — DELETE-only / retention cleanup
      orchestration — EXECs other SPs, no data mutation on the target itself
    Coarse only — no SCD1 / SCD2 / CDC sub-variants. If ambiguous, omit.
    Views and UDFs: omit.
  example: "reload"
