# AI Output Templates -- how @lineage formats its analysis.
# Edit 'instruction' fields to change the AI's output style.
# Full documentation: docs/AI_PROMPTS.md
#
# Fields form a label-section data contract:
#   summary     = headline (one-line purpose)
#   badges      = semantic labels on key nodes (no numbers — system assigns them)
#   sections    = one markdown block per badge label (system orders by data-flow, assembles ## headings)
#   notes       = one-line captions under each node
#   highlights  = color glow on 2-3 critical nodes
#   description = fallback article body (used only when sections[] is absent)

summary:
  instruction: >
    One-line graph purpose (~120 chars, max 300). Shown in the info card.
  example: "Revenue lineage from SAP invoices through EV calculation to FactFinance."

description:
  instruction: >
    Fallback only -- used when sections[] is not provided. Prefer sections[] for structured output.
    If used: structured markdown with ## headings, one heading per logical group.
    Explain what you found -- logic, patterns, issues, performance, column mappings -- whatever is relevant.
    Supported: ## headings, **bold**, `code`, lists, | tables |, LaTeX ($inline$, ```math blocks for display), code blocks.
    For display math use ```math fenced blocks (not $$). One formula per block. For piecewise/conditional logic use a table or bullet list instead of \begin environments.
    Not supported: mermaid, HTML, images, footnotes, LaTeX \begin environments.
    BAD: A standalone essay with no headings, re-describing the graph structure.
    GOOD: "## FX Conversion\n`spConvertFX` multiplies Amount by DimRate.Rate where CurrencyCode = 'CHF'..."
  bad_example: "Data flows from staging through transformation to consumption."
  good_example: |
    ## Revenue Calculation
    Revenue uses the **Earned Value (EV) methodology**:
    ```math
    Revenue = PlannedValue \times \frac{EarnedHours}{PlannedHours}
    ```
    `spCalcEV` reads `DimProject.PlannedValue` and `FactTimesheet.Hours`,
    then `vw_Revenue` applies the Swiss filter: `WHERE CountryCode = 'CH'`.

badges:
  instruction: >
    Semantic labels on nodes you analyzed -- no numbers (system assigns step numbers).
    Same label on multiple nodes groups them under one section heading.
    One label per logical group, as many groups as needed.
    Badge every node that appears in your sections -- section.label must match badge.text exactly (join key).
    BAD: "3 Source" (number in label), badges with no matching section.
    GOOD: "Source" on 2 raw tables, "ETL" on 3 SPs, "Reporting" on 1 view -- each covered by a section.

sections:
  instruction: >
    One entry per unique badge label -- explains what you found at those nodes.
    label: must exactly match a badge text value (join key, case-sensitive).
    text: markdown explaining findings -- logic, patterns, issues, performance, column mappings, formulas.
    System orders sections by data-flow depth and assembles ## headings with step numbers.
    In text, reference other groups by label name ("reads from **Source**"), never by number.
    Supported in text: **bold**, `code`, tables, $math$, ```math blocks.
    BAD: label typo mismatching badge, generic text ("Stores project data"), missing section for a badged group.
    GOOD: { label: "ETL", text: "`spCalcEV` multiplies PlannedValue by earned ratio\nReads from **Source**, writes to **Target**" }
  example: '{ "label": "FX Convert", "text": "`spConvertFX` multiplies Amount by DimRate.Rate\nJoins FactSales.CurrencyKey -> DimRate.CurrencyKey" }'

highlights:
  instruction: >
    Glow 2-3 critical nodes only. Pick ONE scheme:
    Lineage (source/transform/target) or Diagnostic (good/warn/fail).
    Do NOT mix schemes.

notes:
  instruction: >
    One-line caption under each step node -- what it does in this flow.
    Glancing at graph + notes should tell the story without opening the description.
    First line visible, rest on hover via \n.
    BAD: Generic note unrelated to the description ("Stores project data").
    GOOD: "Multiplies Amount x Rate for CHF conversion\nJoins FactSales.CurrencyKey -> DimRate.CurrencyKey"
  example: "Aggregates monthly invoices\nSELECT SUM(Amount) GROUP BY Month FROM Invoices"
