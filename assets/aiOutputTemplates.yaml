# AI Output Templates -- how @lineage formats its analysis.
# Edit 'instruction' fields to change the AI's output style.
# Full documentation: docs/AI_PROMPTS.md
#
# Fields form a layered information hierarchy -- like a magazine article:
#   summary     = headline
#   badges      = numbered step callouts on the diagram (5-8 key nodes only)
#   notes       = figure captions under each step node
#   description = the article body, referencing callout numbers

summary:
  instruction: >
    One-line graph purpose (max 120 chars). Shown in the info card.
  example: "Revenue lineage from SAP invoices through EV calculation to FactFinance."

description:
  instruction: >
    The detailed answer -- structured markdown with ## headings.
    Each heading covers one or more steps: "## Revenue Calculation (steps 3-4)".
    Under each heading, explain the business logic at those nodes -- formulas, column mappings, WHY it matters.
    The graph shows structure; you explain meaning.
    Supported: ## headings, **bold**, `code`, lists, | tables |, LaTeX ($inline$ / $$block$$), code blocks.
    Not supported: mermaid, HTML, images, footnotes.
    BAD: A standalone essay that never mentions step numbers.
    GOOD: "## FX Conversion (step 4)\n`spConvertFX` multiplies Amount by DimRate.Rate where CurrencyCode = 'CHF'..."
  bad_example: "Data flows from staging through transformation to consumption."
  good_example: |
    ## Revenue Calculation (steps 3-4)
    Revenue uses the **Earned Value (EV) methodology**:
    $$Revenue = PlannedValue \times \frac{EarnedHours}{PlannedHours}$$
    `spCalcEV` (step 3) reads `DimProject.PlannedValue` and `FactTimesheet.Hours`,
    then `vw_Revenue` (step 4) applies the Swiss filter: `WHERE CountryCode = 'CH'`.

badges:
  instruction: >
    Numbered navigation anchors on 5-8 KEY nodes -- not every node.
    Format: "1 Source", "3 FX Convert". Number = logical step in the description.
    Only mark a node as a step if the description explains what happens there.
    BAD: 14 steps on 14 nodes (every node marked).
    GOOD: 6 steps on the nodes where business logic lives -- sources, key transforms, final target.

highlights:
  instruction: >
    Glow 2-3 critical nodes only. Pick ONE scheme:
    Lineage (source/transform/target) or Diagnostic (good/warn/fail).
    Do NOT mix schemes.

notes:
  instruction: >
    One-line caption under each step node -- what it does in this flow.
    Glancing at graph + notes should tell the story without opening the description.
    First line visible, rest on hover via \n.
    BAD: Generic note unrelated to the description ("Stores project data").
    GOOD: "Multiplies Amount x Rate for CHF conversion\nJoins FactSales.CurrencyKey -> DimRate.CurrencyKey"
  example: "Aggregates monthly invoices\nSELECT SUM(Amount) GROUP BY Month FROM Invoices"
