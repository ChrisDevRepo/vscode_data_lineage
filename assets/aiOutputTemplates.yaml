# AI Output Templates -- how @lineage formats its analysis.
# Edit 'instruction' fields to change the AI's output style.
# Full documentation: docs/AI_PROMPTS.md
#
# Fields form a label-section data contract:
#   summary     = headline (one-line purpose)
#   badges      = semantic labels on key nodes (no numbers — system assigns them)
#   sections    = one markdown block per badge label (system orders by data-flow, assembles ## headings)
#   notes       = one-line captions under each node
#   highlights  = color glow on 2-3 critical nodes
#   description = fallback article body (used only when sections[] is absent)

summary:
  instruction: >
    One-line graph purpose (~120 chars, max 300). Shown in the info card.
  example: "Revenue lineage from SAP invoices through EV calculation to FactFinance."

description:
  instruction: >
    Fallback only -- used when sections[] is not provided. Prefer sections[] for structured output.
    If used: structured markdown with ## headings, one heading per logical group.
    Explain what you found -- logic, patterns, issues, performance, column mappings -- whatever is relevant.
    Supported: ## headings, **bold**, `code`, lists, | tables |, LaTeX ($inline$, ```math blocks for display), code blocks.
    For display math use ```math fenced blocks (not $$). One formula per block. For piecewise/conditional logic use a table or bullet list instead of \begin environments.
    Not supported: mermaid, HTML, images, footnotes, LaTeX \begin environments.
    BAD: A standalone essay with no headings, re-describing the graph structure.
    GOOD: "## FX Conversion\n`spConvertFX` multiplies Amount by DimRate.Rate where CurrencyCode = 'CHF'..."
  bad_example: "Data flows from staging through transformation to consumption."
  good_example: |
    ## Revenue Calculation
    Revenue uses the **Earned Value (EV) methodology**:
    ```math
    Revenue = PlannedValue \times \frac{EarnedHours}{PlannedHours}
    ```
    `spCalcEV` reads `DimProject.PlannedValue` and `FactTimesheet.Hours`,
    then `vw_Revenue` applies the Swiss filter: `WHERE CountryCode = 'CH'`.

badges:
  instruction: >
    Semantic labels on nodes you explain in your sections -- no numbers (system assigns step numbers).
    Same label on multiple nodes groups them under one section heading.
    Only badge nodes that have their own section -- passthroughs and minor relay nodes do not need badges.
    section.label must match badge.text exactly (join key, case-sensitive).
    BAD: "3 Source" (number in label), badges with no matching section, badging every node.
    GOOD: "Source" on origin tables, "ETL" on SPs that compute logic, "Target" on the destination -- each covered by a section.

sections:
  instruction: >
    One entry per unique badge label. System numbers sections in the ORDER you write them --
    write sections in the narrative sequence you want the reader to follow, not by object type.
    label must exactly match badge.text (join key, case-sensitive).

    CLASSIFY the question before writing. business logic -> formulas, column renames, risks; skip
    ETL mechanics (TRUNCATE, rebuild modes, indexes). technical -> execution and rebuild details.
    documentation -> both.

    Only badge nodes you explain. Passthrough nodes (rename-only views, simple SELECTs) mention
    in one sentence inside the section that uses them -- no badge, no section of their own.

    In section text use the format that fits the content. Column rename or mapping ->
    | From | To | Notes | table. Formula -> ```math block. Multi-step logic -> ordered 1. 2. 3.
    list. Risk or data quality issue -> warning prefix with emoji. Write 3-8 sentences or items
    per section -- not a one-liner, not an object inventory.

    BAD order -- jumping non-linearly (Target -> Source -> ETL -> Views).
    BAD text -- "Stores project data." or "Reads from Source." (no detail).
    GOOD order -- follow the pipeline in one direction without skipping
    (e.g. Target -> ETL -> Views -> Source, or Source -> Views -> ETL -> Target).
    GOOD text -- "`spBuildSalesReport` computes `TotalRevenue = Qty x UnitPrice` at INSERT.
    Reads `Qty` from **Staging View** (rename `OrderQty -> Qty`), `UnitPrice` from **Price View**
    (PriceMaster lookup via 3-CTE chain), `Discount` from **Discount View**
    (`OrderAmount x DiscountPct`). Cross-basis risk -- discount and revenue use different monetary
    bases."
  example: '{ "label": "ETL", "text": "`spCalcEV` multiplies PlannedValue by earned ratio.\nReads from **Source**, writes to **Target**.\n| Input | Column | Notes |\n|---|---|---|\n| DimProject | PlannedValue | base budget |\n| FactTimesheet | Hours | actuals |" }'

highlights:
  instruction: >
    Glow 2-3 critical nodes only. Pick ONE scheme:
    Lineage (source/transform/target) or Diagnostic (good/warn/fail).
    Do NOT mix schemes.

notes:
  instruction: >
    One-line caption under each node -- what it does specifically in this flow, not a generic description.
    Glancing at graph + notes should tell the story without opening the description.
    First line visible, rest on hover via \n.
    If the node is a passthrough, say what it passes or filters ("Passthrough -- WHERE IsValid = 1 filter only").
    BAD: "Stores project data." (generic), "Reads from Source." (no specifics).
    GOOD: "Computes TotalRevenue = Qty x UnitPrice at INSERT\nAlso computes AdjustedRevenue = TotalRevenue - Discount"
  example: "Aggregates monthly invoices\nSELECT SUM(Amount) GROUP BY Month FROM Invoices"
