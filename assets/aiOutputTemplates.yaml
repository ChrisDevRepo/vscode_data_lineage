# ─────────────────────────────────────────────────────────────────────────────
# AI Output Templates — how @lineage captures and formats its analysis.
#
# Drives BOTH what the AI captures per hop AND how the final present_result
# document is rendered. Edit `instruction` text to change behaviour.
#
# VS Code override: `dataLineageViz.ai.outputTemplateFile`. Your overlay
# merges on top of this default — your keys win.
#
# Full key reference (purpose + maintenance for each key): see
#   docs/AI_PROMPTS.md  →  §3 Custom Output Templates (YAML Interface)
# https://github.com/ChrisDevRepo/vscode_data_lineage/blob/main/docs/AI_PROMPTS.md#3-custom-output-templates-yaml-interface
#
# Contract — AI writes parts, engine builds the document:
#
#   AI writes structured PARTS:
#     active phase: business_capture / technical_capture / structural_summary
#                   → produces sections[].text bodies stored in the archive
#     synthesis:    summary, title, intro, sections[], closing, notes[],
#                   highlight_groups[]
#                   → assembled by the engine into the rendered document
#
#   Engine OWNS deterministic outputs (no instruction template — the AI never
#   writes these):
#     - The full markdown document shown in AiDescriptionOverlay (built by
#       orderAndAssemble in src/ai/tools.ts from title + intro + sections[]
#       + closing).
#     - Section numbering (## N {label}), badge chips, ### Objects link blocks.
#
#   Do NOT add an instruction template for any field the engine builds itself.
#   The lift+group+label rule for sections[] lives in src/ai/prompts.ts →
#   buildSynthesisPrompt(), not here, to avoid duplication.
#
# Stages:
#   discovery  = first chat response, no SM. Trivial questions only.
#   active     = per-hop analysis. The AI writes one section per fired
#                *_capture template into `submit_findings.sections[]`.
#                Each fired *_capture produces ONE section (angle + text).
#                business classification → 1 section; technical → 1; both → 2.
#                Templates are independent — no cross-references between
#                business_capture and technical_capture.
#   synthesis  = final document assembly. The engine assembles the rendered
#                document from the AI's submitted parts; the templates here
#                describe only the parts the AI writes from scratch.
#
# Authoritative routing lives in code (templateRenderer.ts → STAGE_BY_KEY).
# YAML `stages:` is informational — overlays that contradict are logged
# and ignored.
# ─────────────────────────────────────────────────────────────────────────────

# ── Card + top of the document ───────────────────────────────────────────────

summary:
  stages: [synthesis]
  instruction: >
    One-line graph purpose (~120 chars, max 300). Shown in the info card.
  example: "Revenue lineage from raw orders through price calculation to FactSalesReport."

title:
  stages: [synthesis]
  instruction: >
    Optional. ≤80 chars. Names the analysis subject and its key finding:
    "[Subject] — [key computation, pattern, or finding]". Include the final
    output object if space allows. Omit step counts and numbers.
    GOOD: "TotalRevenue — Qty × UnitPrice, 6-hop chain to FactSalesReport"
  example: "TotalRevenue — Qty × UnitPrice, 6-hop ETL to FactSalesReport"

intro:
  stages: [synthesis]
  instruction: >
    2–4 sentences of narrative prose as a standalone paragraph before the
    sections. Open by acknowledging the lens implied by the user's question
    (the **Mission type:** set above — `business`, `technical`, or `both`)
    and answer at headline level: what does the analysis reveal, where does
    data originate, what structural pre-conditions does the reader need.
    Refer to shared state by role ("central scratch-pad table", "terminal
    publication step") rather than by listing its columns. Schema details
    (column names, data types, nullability) belong in the later sections.
  example: >
    Read as a business-driven view: TotalRevenue is the product of Qty
    and UnitPrice — both computed independently before joining at
    spBuildSalesReport. Qty originates in raw order imports; UnitPrice is
    derived from supplier margins with a markup formula.

# Section assembly (lift + group + label) is governed by buildSynthesisPrompt()
# in src/ai/prompts.ts — kept there to avoid duplication with the synthesis cue.
# This file documents only the parts the AI writes from scratch.

closing:
  stages: [synthesis]
  instruction: >
    Optional, after the sections, separated by a `---` divider. Two uses:
    (a) when the analysis spans 5+ sections, end with a one-paragraph
    through-line that names the overall pipeline answer in the lens the
    user requested; (b) flag a cross-cutting risk / data-quality issue
    that applies to the whole graph and doesn't fit any single section
    (prefix with ⚠️). Omit if neither applies.
  example: "⚠️ If vwPriceList returns NULL for any SKU, TotalRevenue = Qty × 0 — verify price coverage before each INSERT run."

# `description` is engine output (built by orderAndAssemble in src/ai/tools.ts
# from title + intro + sections[] + closing) — NOT an AI-writeable field.
# No instruction template here, by design.

# ── Graph-side decorations ───────────────────────────────────────────────────

highlights:
  stages: [synthesis]
  instruction: >
    Glow 2–3 critical nodes only. Pick one scheme: Lineage
    (source/transform/target) or Diagnostic (good/warn/fail). Do not mix.

notes:
  stages: [synthesis]
  instruction: >
    Per-node captions (node_id, text). One-line caption under each node —
    what it does specifically in this flow, not a generic description.
    Glancing at graph + notes should tell the story without opening the
    description. First line visible, rest on hover via \n.
    If the node is a passthrough, say what it passes or filters
    ("Passthrough — WHERE IsValid = 1 filter only").
    GOOD: "Computes TotalRevenue = Qty × UnitPrice at INSERT\nAlso computes
    AdjustedRevenue = TotalRevenue - Discount"
  example: "Aggregates monthly invoices\nSELECT SUM(Amount) GROUP BY Month FROM Invoices"

# ── Per-hop capture (active phase) ───────────────────────────────────────────
# Each fired *_capture template produces ONE section into submit_findings.sections[].
# Submit shape: { angle: 'business' | 'technical', text: '<body>' }.
# Independent specs — no cross-references between templates. Each section is
# self-contained; synthesis groups across nodes at the next phase.

business_capture:
  stages: [active]
  instruction: >
    Submit one section: { angle: "business", text: "<body>" }. BUSINESS ONLY —
    what the data means, why it matters, what changes if the rule fires.

    Open the body with one sentence naming the node's actual domain role —
    "computes revenue at INSERT", "allocates budget units to cost centres",
    "historizes price changes into SCD-2 rows". Specific over generic; never
    "stores data" or "processes records".

    Capture every business rule visible in the DDL — every CASE condition,
    every threshold, every allocation formula, every special-case branch.
    Name each column the focus procedure reads or writes; quote the
    predicate or write the formula. Mark risks or data-quality issues with
    ⚠️ inline at the point they apply.

    Format the body with markdown — `## Purpose` paragraph, formulas in
    LaTeX math `$expr$`, column renames as `| From | To | Business meaning |`
    tables when 3+ sibling columns share the rename shape (no datatype
    columns — type info belongs in the technical angle), 1–2 renames as
    prose with backticks, status-enum lifecycles as numbered transitions
    ("1. New → 2. Approved → 3. Shipped"), multi-step rules as ordered lists.
    Use `\`backticks\`` for column and object names. Body is unbounded;
    depth-first capture beats prose extension.

    NEVER include in this section: ` ```sql ` fences, JOIN/MERGE syntax,
    XPath, XML namespaces, datatype tables, index/distribution hints,
    execution-plan notes — those are the technical angle and belong in
    `technical_capture`. The classification gate locks this contract:
    `business`-mission slots that contain technical content are rejected
    with `classification_lock_violation`.

    `badge_label`: name the domain role ("Pricing Calculation", "Catalog
    Metadata", "BOM Explosion"). NEVER name an implementation pattern
    ("XML Shredding", "Recursive CTE", "Window Function"). NEVER use a
    node-type word ("View", "Table", "Procedure", "Function").

    Write each focus node's section fully and independently. Do not detect
    sibling variants here — synthesis sees the whole picture and groups
    similar slots into comparison tables at assembly time.
  example: >
    `spCalcRevenue` computes `TotalRevenue` = $Qty \\times UnitPrice$ at the
    final INSERT into `FactSalesReport`. `Qty` is units sold (renamed from
    `OrderQty` in `CTE_Orders`). `UnitPrice` is list price after markup
    ($CostPrice \\times (1 + MarkupPct)$). ⚠️ Null `MarkupPct` collapses
    `UnitPrice` to `CostPrice` — verify supplier coverage before each run.
    Consumer impact: every revenue dashboard reads `TotalRevenue` directly;
    fix discipline at this node propagates downstream.

technical_capture:
  stages: [active]
  instruction: >
    Submit one section: { angle: "technical", text: "<body>" }. TECHNICAL
    ONLY — how the pipeline runs.

    NEVER include in this section: consumer-impact prose, dashboard-outcome
    framing, plain-English business-rule restatement — those are the
    business angle and belong in `business_capture`. The classification gate
    locks this contract: `technical`-mission slots that contain business
    framing are rejected with `classification_lock_violation`.

    `badge_label`: name the implementation pattern ("XML Shredding",
    "MERGE Upsert", "Window Aggregate", "Recursive CTE"). NEVER use a
    node-type word ("View", "Table", "Procedure", "Function").

    Capture per node:
    - SQL evidence: copy key expressions verbatim — JOIN predicates,
      CASE WHEN conditions, COALESCE fallbacks, computed column formulas.
      Quote as written in the DDL; do not paraphrase. Snippet only, not
      the full INSERT/SELECT statement.
    - Loading pattern (procedure origins only — omit for views, UDFs,
      tables) as one coarse value: `reload` (TRUNCATE + INSERT / full
      refresh), `append` (INSERT-only, no UPDATE or DELETE), `upsert`
      (MERGE or UPDATE + conditional INSERT), `historization` (versioned
      history / change tracking), `purge` (DELETE-only / retention),
      `orchestration` (EXECs other SPs, no data mutation on the target).
      Coarse only — no SCD1 / SCD2 / CDC sub-variants. Write a short
      phrase in your own words if none fit; omit if ambiguous.
    - Every computed column: formula alongside its snippet.
    - Relationships with role labels: "reads lookup from `DimProduct`",
      "writes via MERGE to `FactSalesReport`", "triggered by `spLoadOrders`".
    - Join types when hinted (HASH / MERGE / LOOP) — ⚠️ warn on Cartesian.
    - Antipatterns: excessive DISTINCT, OR in join predicates, correlated
      subqueries in SELECT.
    - Distribution / indexing hints: partition key, hash-distribution column.
    - DDL comments, version annotations — carry author intent lost after
      this hop.

    Format the body with markdown — `## Purpose` paragraph, SQL in
    `\`\`\`sql` code fences (snippet only), join steps as ordered lists,
    risks with ⚠️ inline. Body is unbounded; depth-first capture wins.

    Write each focus node's section fully and independently. Do not write
    "same skeleton as previous, deltas: X" — synthesis detects sibling
    variants across nodes and emits a comparison table at assembly time.
  example: >
    Loading: TRUNCATE + INSERT — full reload, no delta tracking.

    ```sql
    INSERT INTO dbo.FactSalesReport (TotalRevenue, ProductId, Qty)
    SELECT o.OrderQty * p.UnitPrice, o.ProductId, o.OrderQty
    FROM CTE_Orders o
    INNER HASH JOIN DimProduct p ON o.ProductId = p.ProductId
    LEFT JOIN vwPriceList pl ON o.ProductId = pl.ProductId
    WHERE o.IsActive = 1
    ```

    Filters: `WHERE IsActive = 1` is sargable (index on `IsActive`).
    `INNER HASH JOIN` on `ProductId` — correct for large-orders × small-products.
    `LEFT JOIN vwPriceList` on `ProductId` — ⚠️ unmatched rows produce NULL
    downstream; no ISNULL guard before the INSERT.
    Index hint: clustered on `(ProductId, OrderDate)` for downstream aggregation.

# ── Reduced capture for non-bodied starting points ───────────────────────────

structural_summary:
  stages: [active]
  instruction: >
    Reduced capture template — fires only when the user's starting point is a
    non-bodied node (a table or any node without a DDL body). Replaces the
    business_capture / technical_capture templates for this single hop.

    Describe what this node **is**; point to the surrounding procedures for
    what it **does**. Non-bodied nodes carry structure, not behaviour.

    Required sections (use these headings exactly):

    ## Purpose
    One sentence naming the role of this node in the pipeline (≤200 chars).

    ## Columns
    Render the columns list as a `| Column | Type | Role / ⚠️ |` table. Role
    is a short phrase (key / dim / metric / audit / computed). Flag
    nullability risks with ⚠️ inline. Factual metadata only.

    ## Upstream sources
    Bulleted list of adjacent bodied nodes that **write to** this node. One
    line per source: node id + one-sentence role.

    ## Downstream consumers
    Bulleted list of adjacent bodied nodes that **read from** this node. One
    line per consumer: node id + one-sentence role.

    ## Grain / keys
    Primary key + common join keys from foreign keys. One short paragraph.

    Banned in this template: transform formulas, CASE logic, business rules,
    step-by-step behaviour. Those belong in the procedure slots.

# Per-angle section assembly (business / technical / both) is governed by
# buildSynthesisPrompt() in src/ai/prompts.ts. No separate per-angle templates
# here — the lift+group+label rule is identical for both angles and lives in
# the synthesis cue to avoid duplication.

# ── Cross-section rendering at synthesis ─────────────────────────────────────
# Always-on at synthesis. Describes HOW captured content renders consistently
# across every section in the assembled document. Conditional triggers — each
# rule fires only when the captured slot bodies contain the underlying
# material; the AI does NOT invent tables / formulas / fences without source.

general:
  stages: [synthesis]
  instruction: >
    Apply this rendering set across every assembled section so the document
    reads consistently end-to-end:

    - **Formulas**: write as LaTeX `$expr$` whenever the captured body has a
      computation (e.g. `$Revenue = Qty \times Price$`).
    - **Column renames**: render as a `| From | To | Business meaning |`
      table whenever 3+ sibling columns share the rename shape. For 1–2
      renames, prose with backticks is enough.
    - **Source guards** (WHERE / JOIN / MERGE predicates that filter or key
      the data): quote the SQL verbatim inside ```sql code fences. Snippet
      only — never the full INSERT/SELECT statement.
    - **Status-enum lifecycles**: express as numbered transitions
      ("1. New → 2. Approved → 3. Shipped").
    - **Risks / data-quality flags**: every ⚠️ from capture appears in the
      assembled section at the point it applies — verbatim, in place.

    These rules apply only when the captured body has the underlying material.
    Do not invent tables, formulas, or fences without source.
  example: >
    Formula: $TotalRevenue = Qty \times UnitPrice \times (1 - Discount)$

    | From | To | Business meaning |
    | --- | --- | --- |
    | OrderQty | Qty | Units sold per order line |
    | ListPrice | UnitPrice | Price after supplier markup |

    ```sql
    WHERE o.IsActive = 1 AND o.OrderDate >= DATEADD(YEAR, -2, GETDATE())
    ```

    Status flow: 1. New → 2. Reviewed → 3. Approved → 4. Shipped → 5. Closed.

    ⚠️ Null `Discount` collapses TotalRevenue to Qty × UnitPrice — verify input.

# ── Big-picture ETL closing — TECHNICAL angle only ───────────────────────────
# Classification-gated to ['technical', 'both'] in templateRenderer.ts.
# Skips entirely on business-only missions because business framing names
# domain consequences, not load shapes.

loading_pattern:
  stages: [synthesis]
  instruction: >
    Technical-angle closing addition. When all bodied procedures in scope
    share a single load shape, name it once in the closing note as the
    big-picture ETL pattern. Recognized shapes (coarse — no SCD1/SCD2/CDC
    sub-variants):

    - `reload`        TRUNCATE + INSERT / full refresh
    - `append`        INSERT-only, no UPDATE or DELETE
    - `upsert`        MERGE or UPDATE + conditional INSERT
    - `historization` versioned history / change tracking
    - `purge`         DELETE-only / retention
    - `orchestration` EXECs other SPs, no data mutation on the target

    Skip when shapes differ across procedures, when the analysis spans
    non-bodied origins only, or when classification is `business`.
  example: >
    Loading pattern: every bodied procedure in this chain uses TRUNCATE +
    INSERT — each run rebuilds `FactSalesReport` from scratch with no
    delta tracking. Downstream consumers must tolerate full-replace
    semantics; there is no incremental-load fallback.
