# AI Output Templates -- how @lineage formats its analysis.
# Edit 'instruction' fields to change the AI's output style.
# Full documentation: docs/AI_PROMPTS.md
#
# Document building blocks (all optional except summary):
#   summary     = one-line headline shown in the info card
#   title       = # heading at top of description panel
#   intro       = context paragraph before numbered sections
#   sections    = (label KEY, node_ids[] 1..N, text 1..1) tuples — core of the document
#   closing     = cross-cutting risk/note after sections
#   notes       = per-node captions (node_id KEY, text 1..1)
#   highlights  = color glow on 2-3 critical nodes
#   description = fallback article body (used only when sections[] is absent)

summary:
  instruction: >
    One-line graph purpose (~120 chars, max 300). Shown in the info card.
  example: "Revenue lineage from SAP invoices through EV calculation to FactFinance."

title:
  instruction: >
    Optional. ≤80 chars. Names the analysis subject and its key finding:
    "[Subject] — [key computation, pattern, or finding]".
    Include the final output object if space allows. Omit step counts and numbers.
    BAD: "TotalRevenue" (too vague), "Revenue Lineage Analysis Report" (too long, generic).
    GOOD: "TotalRevenue — Qty × UnitPrice, 6-hop chain to FactSalesReport"
  example: "TotalRevenue — Qty × UnitPrice, 6-hop ETL to FactSalesReport"

intro:
  instruction: >
    Optional. 2–4 sentences as a standalone paragraph BEFORE the numbered sections.
    Answer: what does the analysis reveal? where does the data originate? what are
    the key structural pre-conditions or facts the reader needs before diving into details?
    No bullet lists. No headings. Do NOT repeat content from any section — context only.
    BAD: "This graph shows how TotalRevenue flows from Source to Target." (graph walkthrough)
    GOOD: "TotalRevenue is the product of Qty and UnitPrice — both computed independently
    before joining at spBuildSalesReport. Qty originates in raw order imports; UnitPrice
    is derived from supplier margins with a markup formula. No upstream ETL transforms
    either value before they enter the pipeline."
  example: >
    TotalRevenue is the product of Qty and UnitPrice — both computed independently
    before joining at spBuildSalesReport. Qty originates in raw order imports; UnitPrice
    is derived from supplier margins with a markup formula.

sections:
  instruction: >
    Core of the document. Each section is a (label KEY, node_ids[] 1..N, text 1..1) tuple:
      label    = PRIMARY KEY — unique name for this logical group (also the badge chip text on the graph)
      node_ids = nodes that display this label chip (1..N, can be one or many)
      text     = markdown explanation for this group (1..1 per label)

    System numbers labels in the ORDER you write them — write in the narrative sequence you want
    the reader to follow. label has no leading number (system assigns step numbers).

    Same label on multiple nodes groups them. One section per unique label.
    Create 3-6 sections that capture the logical stages of the analysis, not one per node.
    Multiple nodes under one label = one section. Unlabeled nodes go in section text, not node_ids.
    Use the suggested_sections from the completion result as your starting structure.
    Passthrough nodes (rename-only views, simple SELECTs) — mention in one sentence inside
    the section that uses them, do NOT include in node_ids, no separate section.

    CLASSIFY the question before writing:
    business logic -> formulas, column renames, risks.
    technical -> execution details, rebuild order, performance.
    impact -> affected downstream objects, breaking change risk.
    documentation -> business logic + technical combined.
    pattern/investigation -> SQL idioms, anti-patterns, data quality observations.

    In section text use the format that fits the content:
    Column rename or mapping -> | From | To | Notes | table.
    Formula -> ```math block.
    Multi-step logic -> ordered 1. 2. 3. list.
    Risk or data quality issue -> warning prefix with ⚠️.
    Write 3-8 sentences or items per section — not a one-liner, not an object inventory.

    BAD order — jumping non-linearly (Target -> Source -> Transform -> Views).
    BAD text — "Stores project data." or "Reads from Source." (no detail).
    GOOD order — follow the dependency chain in one direction without skipping
    (e.g. Source -> Transform -> Target, or Target -> Transform -> Source).
    GOOD text — "`spBuildSalesReport` computes `TotalRevenue = Qty x UnitPrice` at INSERT.
    Reads `Qty` from **Staging View** (rename `OrderQty -> Qty`), `UnitPrice` from **Price View**
    (PriceMaster lookup via 3-CTE chain)."
  example: '{ "label": "ETL", "node_ids": ["dbo.spCalcEV"], "text": "`spCalcEV` multiplies PlannedValue by earned ratio.\nReads from **Source**, writes to **Target**.\n| Input | Column | Notes |\n|---|---|---|\n| DimProject | PlannedValue | base budget |\n| FactTimesheet | Hours | actuals |" }'

closing:
  instruction: >
    Optional. 1–2 sentences AFTER the sections, separated by a --- divider.
    Use ONLY for a cross-cutting risk, data quality issue, or design note that applies
    to the WHOLE graph and doesn't fit in any single section. Prefix risks with ⚠️.
    Omit if nothing material to add — most analyses do not need a closing.
    BAD: "Overall this correctly computes TotalRevenue." (summary — never repeat what was just said)
    GOOD: "⚠️ If vwPriceList returns NULL for any SKU, TotalRevenue = Qty × 0 —
    verify price coverage before each INSERT run."
  example: "⚠️ If vwPriceList returns NULL for any SKU, TotalRevenue = Qty × 0 — verify price coverage before each INSERT run."

description:
  instruction: >
    Fallback only -- used when sections[] is not provided. Prefer sections[] for structured output.
    If used: structured markdown with ## headings, one heading per logical group.
    Explain what you found -- logic, patterns, issues, performance, column mappings -- whatever is relevant.
    Supported: ## headings, **bold**, `code`, lists, | tables |, LaTeX ($inline$, ```math blocks for display), code blocks.
    For display math use ```math fenced blocks (not $$). One formula per block. For piecewise/conditional logic use a table or bullet list instead of \begin environments.
    Not supported: mermaid, HTML, images, footnotes, LaTeX \begin environments.
    BAD: A standalone essay with no headings, re-describing the graph structure.
    GOOD: "## FX Conversion\n`spConvertFX` multiplies Amount by DimRate.Rate where CurrencyCode = 'CHF'..."
  bad_example: "Data flows from staging through transformation to consumption."
  good_example: |
    ## Revenue Calculation
    Revenue uses the **Earned Value (EV) methodology**:
    ```math
    Revenue = PlannedValue \times \frac{EarnedHours}{PlannedHours}
    ```
    `spCalcEV` reads `DimProject.PlannedValue` and `FactTimesheet.Hours`,
    then `vw_Revenue` applies the Swiss filter: `WHERE CountryCode = 'CH'`.

highlights:
  instruction: >
    Glow 2-3 critical nodes only. Pick ONE scheme:
    Lineage (source/transform/target) or Diagnostic (good/warn/fail).
    Do NOT mix schemes.

notes:
  instruction: >
    Per-node captions (node_id KEY, text 1..1). One-line caption under each node —
    what it does specifically in this flow, not a generic description.
    Glancing at graph + notes should tell the story without opening the description.
    First line visible, rest on hover via \n.
    If the node is a passthrough, say what it passes or filters ("Passthrough -- WHERE IsValid = 1 filter only").
    BAD: "Stores project data." (generic), "Reads from Source." (no specifics).
    GOOD: "Computes TotalRevenue = Qty x UnitPrice at INSERT\nAlso computes AdjustedRevenue = TotalRevenue - Discount"
  example: "Aggregates monthly invoices\nSELECT SUM(Amount) GROUP BY Month FROM Invoices"
