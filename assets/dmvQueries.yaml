version: 1
description: "Read-only catalog queries for Data Lineage Viz"
required_permission: "VIEW DEFINITION"
platforms: [SQL Server 2016+, Azure SQL, Fabric Data Warehouse, Synapse Dedicated SQL Pool]

# Two-phase loading:
#   Phase 1 — schema-preview + all-objects run first.
#     schema-preview  : counts per schema for the schema-selection wizard.
#     all-objects     : lightweight full object catalog (no DDL, no columns) used in
#                       Phase 2 to classify SP dependencies as "cross-schema known" vs
#                       "truly unresolved" and to display correct schema.name pairs in
#                       the dependency details panel.
#   Phase 2 — nodes/columns/dependencies run after the user selects schemas.
#             Each Phase 2 query is wrapped as a subquery with a WHERE filter
#             on the selected schemas, so only matching rows are returned.
#             DDL bodies (nodes) and column metadata are fetched for selected schemas
#             only — keeping Phase 2 fast even in large warehouses.

queries:
  # ── Phase 1: Schema Preview ────────────────────────────────────────────────
  - name: schema-preview
    description: "Phase 1: schema names with per-type object counts (runs first for schema selection wizard)"
    sql: |
      SELECT
        s.name AS schema_name,
        o.type AS type_code,
        COUNT(*) AS object_count
      FROM sys.objects o
      INNER JOIN sys.schemas s ON o.schema_id = s.schema_id
      WHERE o.type IN ('U','V','P','FN','IF','TF')
        AND o.is_ms_shipped = 0
        AND s.name NOT IN ('sys','INFORMATION_SCHEMA')
        AND NOT EXISTS (
          SELECT 1 FROM sys.extended_properties ep
          WHERE ep.major_id = o.object_id AND ep.class = 1
            AND ep.name = 'microsoft_database_tools_support'
        )
      GROUP BY s.name, o.type
      ORDER BY s.name, o.type

  # ── Phase 1: Full Object Catalog ────────────────────────────────────────────
  - name: all-objects
    description: >
      Phase 1: complete object catalog across ALL schemas (no DDL, no columns).
      Runs alongside schema-preview to enable cross-schema reference resolution in Phase 2.
      When a stored procedure in schema A references a table in schema B (not selected),
      this catalog classifies that reference as "cross-schema known" rather than
      "unresolved". Also provides catalog-original schema casing for display in the
      dependency details panel (In / Out counts and neighbor tooltips).
    sql: |
      SELECT
        s.name AS schema_name,
        o.name AS object_name,
        o.type AS type_code
      FROM sys.objects o
      INNER JOIN sys.schemas s ON o.schema_id = s.schema_id
      WHERE o.type IN ('U','V','P','FN','IF','TF')
        AND o.is_ms_shipped = 0
        AND s.name NOT IN ('sys','INFORMATION_SCHEMA')
        AND NOT EXISTS (
          SELECT 1 FROM sys.extended_properties ep
          WHERE ep.major_id = o.object_id AND ep.class = 1
            AND ep.name = 'microsoft_database_tools_support'
        )
      ORDER BY s.name, o.name

  # ── Phase 2: Full Extraction (filtered by selected schemas) ─────────────────
  - name: nodes
    description: "Phase 2: DDL definitions for selected schemas (combined via LEFT JOIN)"
    sql: |
      SELECT
        s.name AS schema_name,
        o.name AS object_name,
        o.type AS type_code,
        m.definition AS body_script
      FROM sys.objects o
      INNER JOIN sys.schemas s ON o.schema_id = s.schema_id
      LEFT JOIN sys.sql_modules m ON o.object_id = m.object_id
      WHERE o.type IN ('U','V','P','FN','IF','TF')
        AND o.is_ms_shipped = 0
        AND s.name NOT IN ('sys','INFORMATION_SCHEMA')
        AND NOT EXISTS (
          SELECT 1 FROM sys.extended_properties ep
          WHERE ep.major_id = o.object_id AND ep.class = 1
            AND ep.name = 'microsoft_database_tools_support'
        )
      ORDER BY s.name, o.name

  - name: columns
    description: "Phase 2: column metadata for table DDL preview (selected schemas)"
    sql: |
      SELECT
        s.name AS schema_name,
        o.name AS table_name,
        c.column_id AS ordinal,
        c.name AS column_name,
        t.name AS type_name,
        c.max_length,
        c.precision,
        c.scale,
        c.is_nullable,
        c.is_identity,
        c.is_computed
      FROM sys.columns c
      INNER JOIN sys.objects o ON c.object_id = o.object_id
      INNER JOIN sys.schemas s ON o.schema_id = s.schema_id
      INNER JOIN sys.types t ON c.user_type_id = t.user_type_id
      WHERE o.type = 'U'
        AND o.is_ms_shipped = 0
        AND s.name NOT IN ('sys','INFORMATION_SCHEMA')
        AND NOT EXISTS (
          SELECT 1 FROM sys.extended_properties ep
          WHERE ep.major_id = o.object_id AND ep.class = 1
            AND ep.name = 'microsoft_database_tools_support'
        )
      ORDER BY s.name, o.name, c.column_id

  - name: dependencies
    description: >
      Phase 2: object-level SQL expression dependencies (referencing → referenced).
      Filters to referenced_schema_name IS NOT NULL — only rows where SQL Server
      resolved the reference to a concrete schema at SP/view creation time are returned.
      Unqualified references (EXEC SomeProc without schema prefix) have
      referenced_schema_name = NULL and are excluded: SQL Server cannot guarantee
      which schema would be used at runtime (the default schema is caller-configurable).
      Only schema-qualified names (schema.object) are supported by this tool.
    sql: |
      SELECT
        s1.name AS referencing_schema,
        o1.name AS referencing_name,
        d.referenced_schema_name AS referenced_schema,
        d.referenced_entity_name AS referenced_name
      FROM sys.sql_expression_dependencies d
      INNER JOIN sys.objects o1 ON d.referencing_id = o1.object_id
      INNER JOIN sys.schemas s1 ON o1.schema_id = s1.schema_id
      WHERE d.referenced_schema_name IS NOT NULL
        AND d.referenced_entity_name IS NOT NULL
        AND o1.is_ms_shipped = 0
        AND s1.name NOT IN ('sys','INFORMATION_SCHEMA')
      ORDER BY referencing_schema, referencing_name
